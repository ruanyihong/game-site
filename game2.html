  // 投掷
  grenade: { id: 'grenade', name: '手榴弹', team: 'usa', kind: 'thrown', dmg: 70, range: 260, rof: 0.5, noise: 0.9, silent: false, ammo: 3, desc: '范围爆炸' },
  smoke: { id: 'smoke', name: '烟雾弹', team: 'china', kind: 'thrown', dmg: 0, range: 220, rof: 0.5, noise: 0.1, silent: true, ammo: 3, desc: '制造遮蔽' },

// 各队默认装备
const TEAM_LOADOUT = {
  china: ['dagger', 'crossbow', 'trap_jaw'],
  usa: ['saber', 'rifle', 'pistol'],
};

// ===== data/tasks.js =====
// 任务模板（按难度分级，奖励金银铜）
const TASK_TEMPLATES = [
  { id: 'collect', diff: 'easy', desc: '采集 {n} 份资源（金/银/铜）', goal: { type: 'collect', n: 5 }, reward: { gold: 8, silver: 6, copper: 10 } },
  { id: 'hunt', diff: 'easy', desc: '击杀 {n} 名敌方单位', goal: { type: 'kill', n: 2 }, reward: { gold: 6, silver: 8, copper: 6 } },
  { id: 'gather_gem', diff: 'medium', desc: '收集 {n} 颗宝石', goal: { type: 'gem', n: 3 }, reward: { gold: 14, silver: 10, copper: 8 } },
  { id: 'sniff', diff: 'medium', desc: '鉴定并举报 {n} 块假金', goal: { type: 'fake', n: 2 }, reward: { gold: 10, silver: 12, copper: 10 } },
  { id: 'raid', diff: 'hard', desc: '摧毁敌方基地（造成 {n} 点破坏）', goal: { type: 'raid', n: 100 }, reward: { gold: 30, silver: 20, copper: 15 } },
  { id: 'conquer', diff: 'hard', desc: '击杀 {n} 名敌方单位', goal: { type: 'kill', n: 6 }, reward: { gold: 24, silver: 18, copper: 12 } },
];

const DIFF_LABEL = { easy: '易', medium: '中', hard: '难' };

// ===== engine/rng.js =====
// 可复现随机数（mulberry32）
function makeRNG(seed = Date.now()) {
  let s = seed >>> 0;
  function next() {
    s |= 0;
    s = (s + 0x6d2b79f5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
  return {
    next,
    range: (a, b) => a + next() * (b - a),
    int: (a, b) => Math.floor(a + next() * (b - a + 1)),
    pick: (arr) => arr[Math.floor(next() * arr.length)],
    chance: (p) => next() < p,
  };
}

// ===== engine/render.js =====
// 通用 Canvas 绘制工具
const Render = {
  rect(ctx, x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
  },
  strokeRect(ctx, x, y, w, h, color, lw = 1) {
    ctx.strokeStyle = color;
    ctx.lineWidth = lw;
    ctx.strokeRect(x, y, w, h);
  },
  circle(ctx, x, y, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  },
  strokeCircle(ctx, x, y, r, color, lw = 1) {
    ctx.strokeStyle = color;
    ctx.lineWidth = lw;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();
  },
  line(ctx, x1, y1, x2, y2, color, lw = 1) {
    ctx.strokeStyle = color;
    ctx.lineWidth = lw;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  },
  text(ctx, str, x, y, color = '#fff', size = 14, align = 'left') {
    ctx.fillStyle = color;
    ctx.font = `${size}px sans-serif`;
    ctx.textAlign = align;
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(str, x, y);
  },
  // 血条
  healthBar(ctx, x, y, w, h, ratio, color = '#2ecc71') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w * Math.max(0, Math.min(1, ratio)), h);
  },
};

// ===== engine/collision.js =====
// 碰撞与几何工具
function dist(ax, ay, bx, by) {
  return Math.hypot(ax - bx, ay - by);
}

function dist2(ax, ay, bx, by) {
  const dx = ax - bx, dy = ay - by;
  return dx * dx + dy * dy;
}

function clamp(v, lo, hi) {
  return v < lo ? lo : v > hi ? hi : v;
}

// 圆-圆相交
function circleHit(ax, ay, ar, bx, by, br) {
  return dist2(ax, ay, bx, by) <= (ar + br) * (ar + br);
}

// 点是否在矩形内（矩形以 x,y,w,h 像素表示）
function pointInRect(px, py, x, y, w, h) {
  return px >= x && px <= x + w && py >= y && py <= y + h;
}

// 线段是否被树木遮挡（用于视线判定）：采样检测
function lineBlocked(x1, y1, x2, y2, isBlockedAt) {
  const steps = Math.ceil(dist(x1, y1, x2, y2) / 12);
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    if (isBlockedAt(x1 + (x2 - x1) * t, y1 + (y2 - y1) * t)) return true;
  }
  return false;
}

function normalize(dx, dy) {
  const l = Math.hypot(dx, dy) || 1;
  return [dx / l, dy / l];
}

// ===== engine/input.js =====
// 键鼠输入管理
class Input {
  constructor(canvas) {
    this.canvas = canvas;
    this.keys = new Set();
    this.justPressed = new Set();
    this.mouse = { x: 0, y: 0, down: false, justDown: false };
    this._bind();
  }
  _bind() {
    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (!this.keys.has(k)) this.justPressed.add(k);
      this.keys.add(k);
      if ([' ', 'tab'].includes(k)) e.preventDefault();
    });
    window.addEventListener('keyup', (e) => this.keys.delete(e.key.toLowerCase()));
    this.canvas.addEventListener('mousemove', (e) => {
      const r = this.canvas.getBoundingClientRect();
      this.mouse.x = e.clientX - r.left;
      this.mouse.y = e.clientY - r.top;
    });
    this.canvas.addEventListener('mousedown', () => {
      if (!this.mouse.down) this.mouse.justDown = true;
      this.mouse.down = true;
    });
    window.addEventListener('mouseup', () => (this.mouse.down = false));
  }
  down(k) { return this.keys.has(k); }
  pressed(k) { return this.justPressed.has(k); }
  // 每帧末调用，清理单次状态
  endFrame() {
    this.justPressed.clear();
    this.mouse.justDown = false;
  }
}

// ===== engine/camera.js =====


// 摄像机：跟随目标并裁剪到世界边界
class Camera {
  constructor(vw, vh) {
    this.x = 0; this.y = 0;
    this.vw = vw; this.vh = vh;
  }
  follow(tx, ty) {
    this.x = clamp(tx - this.vw / 2, 0, Math.max(0, WORLD_W - this.vw));
    this.y = clamp(ty - this.vh / 2, 0, Math.max(0, WORLD_H - this.vh));
  }
  // 世界坐标 -> 屏幕坐标
  toScreen(wx, wy) {
    return [wx - this.x, wy - this.y];
  }
  // 屏幕坐标 -> 世界坐标
  toWorld(sx, sy) {
    return [sx + this.x, sy + this.y];
  }
}

// ===== engine/loop.js =====
// 游戏主循环（requestAnimationFrame + dt 限制）
function startLoop(update, render) {
  let last = performance.now();
  function frame(now) {
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 0.05) dt = 0.05; // 防止卡顿后大跳
    update(dt);
    render();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ===== world/tiles.js =====


// 地形属性查询（基于网格）
class World {
  constructor(rng) {
    this.rng = rng;
    this.grid = [];
    this.tunnels = new Set(); // "x,y" 中国队隐藏通道
    this.generate();
  }

  generate() {
    const { MAP_W: W, MAP_H: H } = { MAP_W: this.W(), MAP_H: this.H() };
    this.grid = Array.from({ length: H }, () => new Array(W).fill(T.GROUND));

    // 中央湖泊 + 河床
    const lakeX = Math.floor(W * 0.5), lakeY = Math.floor(H * 0.5);
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const d = Math.hypot(x - lakeX, (y - lakeY) * 1.4);
        if (d < 4) this.grid[y][x] = T.WATER;
        else if (d < 6) this.grid[y][x] = T.RIVERBED;
      }
    }

    // 森林树木（基地周围稀疏，中部密集）
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        if (this.grid[y][x] !== T.GROUND) continue;
        const nearBase =
          (x < 16) || (x > W - 16) || this.inBase(x, y, 'china') || this.inBase(x, y, 'usa');
        const density = nearBase ? 0.08 : 0.26;
        if (this.rng.chance(density)) this.grid[y][x] = T.TREE;
      }
    }

    // 岩石点缀
    for (let i = 0; i < 40; i++) {
      const x = this.rng.int(2, W - 3), y = this.rng.int(2, H - 3);
      if (this.grid[y][x] === T.GROUND) this.grid[y][x] = T.ROCK;
    }

    // 基地区域铺设
    this.paintBase('china', T.BASE_C);
    this.paintBase('usa', T.BASE_U);

    // 中国队地道（从基地蜿蜒通向中部，提供隐蔽通道）
    this.carveTunnels();
  }

  W() { return Math.floor((this.grid[0] ? this.grid[0].length : 0)) || 64; }
  H() { return this.grid.length || 44; }

  paintBase(team, code) {
    const b = BASE[team];
    for (let y = b.ty; y < b.ty + b.th; y++) {
      for (let x = b.tx; x < b.tx + b.tw; x++) {
        if (y >= 0 && y < this.H() && x >= 0 && x < this.W()) this.grid[y][x] = code;
      }
    }
  }

  carveTunnels() {
    const b = BASE.china;
    let x = b.tx, y = Math.floor(b.ty + b.th / 2);
    const targetX = Math.floor(this.W() * 0.62);
    while (x > targetX) {
      this.tunnels.add(`${x},${y}`);
      // 蜿蜒
      if (this.rng.chance(0.5)) y += this.rng.chance(0.5) ? 1 : -1;
      y = Math.max(1, Math.min(this.H() - 2, y));
      if (this.grid[y][x] === T.TREE) this.grid[y][x] = T.GROUND;
      x--;
    }
  }

  inBase(tx, ty, team) {
    const b = BASE[team];
    return tx >= b.tx && tx < b.tx + b.tw && ty >= b.ty && ty < b.ty + b.th;
  }

  tileAtWorld(wx, wy) {
    const tx = Math.floor(wx / TILE), ty = Math.floor(wy / TILE);
    if (tx < 0 || ty < 0 || tx >= this.W() || ty >= this.H()) return T.ROCK;
    return this.grid[ty][tx];
  }

  isTunnelAt(wx, wy) {
    const tx = Math.floor(wx / TILE), ty = Math.floor(wy / TILE);
    return this.tunnels.has(`${tx},${ty}`);
  }

  baseAt(wx, wy) {
    const tx = Math.floor(wx / TILE), ty = Math.floor(wy / TILE);
    if (this.inBase(tx, ty, 'china')) return 'china';
    if (this.inBase(tx, ty, 'usa')) return 'usa';
    return null;
  }

  // 移动阻挡：树木/岩石/水域
  blocksMove(wx, wy) {
    const c = this.tileAtWorld(wx, wy);
    return c === T.TREE || c === T.ROCK || c === T.WATER;
  }

  // 视线阻挡：仅树木
  blocksSight(wx, wy) {
    return this.tileAtWorld(wx, wy) === T.TREE;
  }

  // 视线是否被树木遮挡
  lineBlockedSight(x1, y1, x2, y2) {
    return lineBlocked(x1, y1, x2, y2, (x, y) => this.blocksSight(x, y));
  }

  // 武器击倒树木：将树木格子变为平地
  destroyTreeAt(wx, wy) {
    const tx = Math.floor(wx / TILE);
    const ty = Math.floor(wy / TILE);
    if (tx >= 0 && tx < this.W() && ty >= 0 && ty < this.H() && this.grid[ty][tx] === T.TREE) {
      this.grid[ty][tx] = T.GROUND;
      return true;
    }
    return false;
  }
}

// 四季状态机：环境效果 + 季节切换回调
class SeasonManager {
  constructor(onChange) {
    this.index = 0;
    this.timer = 0;
    this.onChange = onChange; // (season, prev) => void
  }
  get current() { return SEASONS[this.index]; }
  get name() {
    return { spring: '春', summer: '夏', autumn: '秋', winter: '冬' }[this.current];
  }
  update(dt) {
    this.timer += dt;
    if (this.timer >= SEASON_DURATION) {
      this.timer = 0;
      const prev = this.current;
      this.index = (this.index + 1) % SEASONS.length;
      if (this.onChange) this.onChange(this.current, prev);
    }
  }
  // 环境因子
  env() {
    switch (this.current) {
      case 'spring': return { detectMult: 0.95, speedMult: 1.0, concealBonus: 0.18, waterActive: false, snow: false, leaf: false };
      case 'summer': return { detectMult: 1.0, speedMult: 1.0, concealBonus: 0.05, waterActive: true, snow: false, leaf: false };
      case 'autumn': return { detectMult: 1.15, speedMult: 1.0, concealBonus: 0.0, waterActive: false, snow: false, leaf: true };
      case 'winter': return { detectMult: 0.9, speedMult: 0.8, concealBonus: 0.22, waterActive: false, snow: true, leaf: false };
      default: return { detectMult: 1, speedMult: 1, concealBonus: 0, waterActive: false, snow: false, leaf: false };
    }
  }
}

// 装备系统：眼科技眼镜（付费/电量/宝石充电）+ 宝石发现器（免费/ABC精度）
class Equipment {
  constructor() {
    this.glassesUnlocked = false;
    this.glassesBattery = 0;       // 0-100
    this.detectorLevel = 'A';      // A/B/C
    this.detectorActive = false;
    this.detectorExposure = 0;     // 开启时累积的暴露信号
  }

  unlockGlasses(inv) {
    if (this.glassesUnlocked) return { ok: false, msg: '已解锁' };
    const cost = 30;
    if (inv.gold < cost) return { ok: false, msg: `需要 ${cost} 金` };
    inv.gold -= cost;
    this.glassesUnlocked = true;
    this.glassesBattery = 100;
    return { ok: true, msg: '眼科技眼镜已租用（电量100）' };
  }

  chargeGlasses(inv) {
    if (!this.glassesUnlocked) return { ok: false, msg: '未解锁眼镜' };
    if (inv.gems <= 0) return { ok: false, msg: '无宝石可充电' };
    if (this.glassesBattery >= 100) return { ok: false, msg: '电量已满' };
    inv.gems -= 1;
    this.glassesBattery = 100;
    return { ok: true, msg: '用宝石充满电量' };
  }

  // 使用眼镜鉴定：消耗电量，返回是否可用
  canIdentify() {
    return this.glassesUnlocked && this.glassesBattery > 0;
  }
  drainIdentify() {
    this.glassesBattery = Math.max(0, this.glassesBattery - 12);
  }

  upgradeDetector(inv) {
    const cost = { A: 20, B: 40 };
    const next = { A: 'B', B: 'C' };
    if (this.detectorLevel === 'C') return { ok: false, msg: '已是最高精度C' };
    const c = cost[this.detectorLevel];
    if (inv.gold < c) return { ok: false, msg: `需要 ${c} 金` };
    inv.gold -= c;
    this.detectorLevel = next[this.detectorLevel];
    return { ok: true, msg: `宝石发现器升级至 ${this.detectorLevel} 级` };
  }

  toggleDetector() { this.detectorActive = !this.detectorActive; }
  detectorRadius() { return GEM_DETECT_RADIUS[this.detectorLevel]; }

  // 每帧更新：开启发现器产生暴露信号（被敌人察觉风险）
  update(dt) {
    if (this.detectorActive) {
      this.detectorExposure += dt * 0.5;
    } else {
      this.detectorExposure = Math.max(0, this.detectorExposure - dt);
    }
  }
}

// 资源与背包：金银铜 + 宝石 + 可疑金（需鉴定）+ 已确认假金
class Inventory {
  constructor() {
    this.gold = 0;
    this.silver = 0;
    this.copper = 0;
    this.gems = 0;       // 用于给眼镜充电
    this.suspect = [];   // 未鉴定"金"，元素为 boolean(是否假)
    this.fakeGold = 0;   // 已确认假金
  }

  addResource(type, n = 1) {
    if (type === 'gold') this.gold += n;
    else if (type === 'silver') this.silver += n;
    else if (type === 'copper') this.copper += n;
    else if (type === 'gem') this.gems += n;
  }

  // 捡到"金/假金"均进入可疑池，需眼镜鉴定
  pickSuspect(isFake) { this.suspect.push(isFake); }

  canAfford(g, s, c) {
    return this.gold >= g && this.silver >= s && this.copper >= c;
  }
  spend(g, s, c) {
    this.gold -= g; this.silver -= s; this.copper -= c;
  }

  // 用眼镜鉴定全部可疑金；返回 {real, fake}
  identifyAll(equipment, reputation) {
    if (!equipment.glassesUnlocked) return { ok: false, msg: '眼镜未配发（按 B 商店配发）' };
    if (equipment.glassesBattery <= 0) return { ok: false, msg: '眼镜没电！按 B 商店用宝石充电' };
    if (this.suspect.length === 0) return { ok: false, msg: '暂无可鉴定的可疑金' };
    let real = 0, fake = 0;
    for (const f of this.suspect) {
      if (f) { this.fakeGold++; fake++; } else { this.gold += 10; real++; }
    }
    this.suspect.length = 0;
    equipment.drainIdentify();
    if (fake > 0) reputation.gain(fake * REP_PER_FAKEGOLD);
    return { ok: true, msg: `鉴定完成：真金${real} 假金${fake}（信誉+${fake * REP_PER_FAKEGOLD}）` };
  }

  total() { return this.gold + this.silver + this.copper; }
}

}

const PROJ_SPEED = { bullet: 720, grenade: 400, smoke: 340 };

function createWeaponState(id) {
  const def = WEAPONS[id];
  return {
    ...def,
    ammoMax: def.ammo || 0,
    ammo: def.ammo || 0,
    cd: 0,
  };
}

class Projectile {
  constructor(opts) {
    Object.assign(this, opts);
    this.dead = false;
    this.trail = [];
    this.px = opts.x; this.py = opts.y;
  }
}

// 开火：根据当前武器类型产生子弹/抛投物，或近战即时命中
// 返回 {fired, noise}（noise 用于敌人察觉）
function fireWeapon(shooter, tx, ty, ctx) {
  const w = shooter.weapons[shooter.curWeapon];
  if (!w || w.cd > 0) return { fired: false };
  const dx = tx - shooter.x, dy = ty - shooter.y;
  const len = Math.hypot(dx, dy) || 1;
  const nx = dx / len, ny = dy / len;
  shooter.facing = Math.atan2(dy, dx);

  if (w.kind === 'melee') {
    w.cd = 1 / w.rof;
    shooter.muzzle = 0.07;
    const hit = meleeHit(shooter, w, ctx);
    return { fired: true, noise: w.noise, hit };
  }

  if (w.kind === 'trap') return { fired: false }; // 陷阱走专门放置逻辑

  if (w.ammo <= 0) return { fired: false, empty: true };
  w.ammo -= 1;
  w.cd = 1 / w.rof;

  const type = w.kind === 'thrown' ? (w.id === 'grenade' ? 'grenade' : 'smoke') : 'bullet';
  const proj = new Projectile({
    x: shooter.x + nx * (shooter.radius + 4),
    y: shooter.y + ny * (shooter.radius + 4),
    vx: nx * PROJ_SPEED[type],
    vy: ny * PROJ_SPEED[type],
    dmg: w.dmg, team: shooter.team, silent: w.silent,
    noise: w.noise, kind: type, life: type === 'bullet' ? 0.9 : 1.6,
    range: w.range, traveled: 0,
  });
  ctx.projectiles.push(proj);
  shooter.muzzle = 0.09;
  return { fired: true, noise: w.noise };
}

function meleeHit(shooter, w, ctx) {
  let hitSomething = false;
  // 近战劈砍树木（朝向方向前方一格范围）
  const chopX = shooter.x + Math.cos(shooter.facing) * (w.range + TILE * 0.6);
  const chopY = shooter.y + Math.sin(shooter.facing) * (w.range + TILE * 0.6);
  if (ctx.world.tileAtWorld(chopX, chopY) === T.TREE) {
    ctx.world.destroyTreeAt(chopX, chopY);
    ctx.game.addTreeFallFX(chopX, chopY);
    hitSomething = true;
  }
  for (const u of ctx.units) {
    if (!u.alive || u.team === shooter.team) continue;
    const d = Math.hypot(u.x - shooter.x, u.y - shooter.y);
    if (d <= w.range + u.radius) {
      // 朝向前方扇形
      const ang = Math.atan2(u.y - shooter.y, u.x - shooter.x);
      let diff = Math.abs(ang - shooter.facing);
      if (diff > Math.PI) diff = 2 * Math.PI - diff;
      if (diff < 1.1) {
        ctx.combat.damage(u, w.dmg);
        hitSomething = true;
      }
    }
  }
  return hitSomething;
}

function updateProjectiles(ctx, dt) {
  for (const p of ctx.projectiles) {
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 8) p.trail.shift();
    const step = Math.hypot(p.vx, p.vy) * dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.traveled += step;
    p.life -= dt;
    if (p.life <= 0 || p.traveled >= p.range) {
      detonate(p, ctx);
      p.dead = true;
      continue;
    }
    // 撞树/石/水 —— 树木可被武器击倒
    if (ctx.world.blocksMove(p.x, p.y)) {
      const tileT = ctx.world.tileAtWorld(p.x, p.y);
      if (tileT === T.TREE) {
        // 武器击倒树木
        ctx.world.destroyTreeAt(p.x, p.y);
        ctx.game.addTreeFallFX(p.x, p.y);
        detonate(p, ctx);
        p.dead = true;
        continue;
      }
      // 岩石和水仍然直接阻挡
      detonate(p, ctx);
      p.dead = true;
      continue;
    }
    // 命中单位
    for (const u of ctx.units) {
      if (!u.alive || u.team === p.team) continue;
      if (Math.hypot(u.x - p.x, u.y - p.y) <= u.radius + 4) {
        if (p.kind === 'bullet') {
          ctx.combat.damage(u, p.dmg);
          p.dead = true;
        } else {
          detonate(p, ctx);
          p.dead = true;
        }
        break;
      }
    }
  }
  for (let i = ctx.projectiles.length - 1; i >= 0; i--) {
    if (ctx.projectiles[i].dead) ctx.projectiles.splice(i, 1);
  }
}

function detonate(p, ctx) {
  if (p.kind === 'grenade') {
    ctx.combat.explode(p.x, p.y, 70, p.dmg, p.team, ctx.units, ctx.world, ctx.game);
  } else if (p.kind === 'smoke') {
    ctx.smokes.push({ x: p.x, y: p.y, r: 90, life: 6 });
  }
}

// ===== systems/combat.js =====
// 战斗结算：伤害、死亡、范围爆炸、基地破坏

class Combat {
  constructor(game) { this.game = game; }

  damage(u, dmg) {
    if (!u.alive) return;
    // 新手友好：敌人对玩家的伤害打六折
    if (u.isPlayer) dmg = Math.ceil(dmg * 0.6);
    u.hp -= dmg;
    if (u.hp <= 0) {
      u.hp = 0; u.alive = false;
      this.game.onUnitKilled(u);
    }
  }

  explode(x, y, r, dmg, team, units, world, game) {
    for (const u of units) {
      if (!u.alive || u.team === team) continue;
      if (Math.hypot(u.x - x, u.y - y) <= r + u.radius) {
        this.damage(u, dmg);
      }
    }
    // 爆炸范围内树木也被炸倒
    if (world) {
      const tiles = Math.ceil(r / TILE);
      for (let dy = -tiles; dy <= tiles; dy++) {
        for (let dx = -tiles; dx <= tiles; dx++) {
          const tx = Math.floor(x / TILE) + dx, ty = Math.floor(y / TILE) + dy;
          if (tx >= 0 && tx < world.W() && ty >= 0 && ty < world.H()) {
            if (world.grid[ty][tx] === T.TREE && Math.hypot(dx * TILE, dy * TILE) <= r) {
              world.grid[ty][tx] = T.GROUND;
              if (game) game.addTreeFallFX(tx * TILE + TILE / 2, ty * TILE + TILE / 2);
            }
          }
        }
      }
    }
  }

  // 对敌方基地造成伤害（玩家攻击敌队基地）
  damageBase(baseTeam, dmg) {
    const base = this.game.bases[baseTeam];
    if (base.hp <= 0) return;
    base.hp = Math.max(0, base.hp - dmg);
    this.game.stats.raid += dmg;
    if (base.hp <= 0) this.game.onBaseDestroyed(baseTeam);
  }
}

let _tid = 1;

// 任务系统：接取 -> 事件推进 -> 完成结算奖励
class TaskManager {
  constructor() {
    this.tasks = []; // {id, def, progress, done}
  }

  addTask(def) {
    if (this.tasks.some((t) => t.def.id === def.id && !t.done)) return null;
    const t = { id: _tid++, def, progress: 0, done: false };
    this.tasks.push(t);
    return t;
  }

  randomTask(rng) {
    const def = rng.pick(TASK_TEMPLATES);
    return this.addTask(def);
  }

  // 游戏事件推进进度
  event(type, n = 1) {
    for (const t of this.tasks) {
      if (t.done) continue;
      if (t.def.goal.type === type) {
        t.progress = Math.min(t.def.goal.n, t.progress + n);
      }
    }
  }

  // 每帧检查完成并发奖
  update(inv, rep) {
    const msgs = [];
    for (const t of this.tasks) {
      if (!t.done && t.progress >= t.def.goal.n) {
        t.done = true;
        const r = t.def.reward;
        inv.gold += r.gold; inv.silver += r.silver; inv.copper += r.copper;
        msgs.push(`任务完成【${t.def.desc.replace('{n}', t.def.goal.n)}】 奖励 金${r.gold}/银${r.silver}/铜${r.copper}`);
      }
    }
    return msgs;
  }

  activeList() {
    return this.tasks.filter((t) => !t.done).map((t) => ({
      desc: t.def.desc.replace('{n}', t.def.goal.n),
      diff: DIFF_LABEL[t.def.diff],
      progress: `${t.progress}/${t.def.goal.n}`,
    }));
  }
}

function randomGround(world, rng) {
  for (let i = 0; i < 50; i++) {
    const x = rng.int(1, world.W() - 2), y = rng.int(1, world.H() - 2);
    const c = world.grid[y][x];
    if (c === T.GROUND || c === T.RIVERBED) {
      return [(x + 0.5) * TILE, (y + 0.5) * TILE];
    }
  }
  return [(world.W() / 2) * TILE, (world.H() / 2) * TILE];
}

// 初始散布资源、埋藏宝石、真假金
function populateItems(world, rng) {
  const items = [];
  const types = ['gold', 'silver', 'copper'];
  for (let i = 0; i < 45; i++) {
    const [x, y] = randomGround(world, rng);
    items.push(makeItem(rng.pick(types), x, y));
  }
  // 埋藏宝石（需宝石发现器）
  for (let i = 0; i < 14; i++) {
    const [x, y] = randomGround(world, rng);
    items.push(makeItem('gem', x, y, { buried: true }));
  }
  // 真假金混入
  for (let i = 0; i < 10; i++) {
    const [x, y] = randomGround(world, rng);
    items.push(makeItem('gold', x, y));
  }
  for (let i = 0; i < 8; i++) {
    const [x, y] = randomGround(world, rng);
    items.push(makeItem('fakeGold', x, y));
  }
  return items;
}

function inSmoke(game, x, y) {
  for (const s of game.smokes) {
    if (Math.hypot(s.x - x, s.y - y) <= s.r) return true;
  }
  return false;
}
function nearWater(world, x, y) {
  const tx = Math.floor(x / TILE), ty = Math.floor(y / TILE);
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      if (world.grid[ty + dy] && world.grid[ty + dy][tx + dx] === 3) return true;
    }
  }
  return false;
}

function updatePlayer(game, dt) {
  const p = game.player;
  if (!p.alive) return;
  const input = game.input, cam = game.camera, world = game.world;
  const env = game.season.env();
  const cfg = game.teamCfg(p.team);

  // 移动输入
  let mx = 0, my = 0;
  if (input.down('w') || input.down('arrowup')) my -= 1;
  if (input.down('s') || input.down('arrowdown')) my += 1;
  if (input.down('a') || input.down('arrowleft')) mx -= 1;
  if (input.down('d') || input.down('arrowright')) mx += 1;
  const moving = mx || my;
  if (moving) { const l = Math.hypot(mx, my); mx /= l; my /= l; }

  // 速度（季节/水源/队伍/雪地摩托）
  let speed = PLAYER_BASE_SPEED * p.speedMul() * cfg.speedMult;
  if (env.snow) speed *= 0.8;
  if (env.waterActive && p.water <= 0 && !p.hasWaterGem) speed *= 0.55;
  if (mx && !world.blocksMove(p.x + mx * speed * dt, p.y)) p.x += mx * speed * dt;
  if (my && !world.blocksMove(p.x, p.y + my * speed * dt)) p.y += my * speed * dt;

  // 朝向鼠标
  const [wx, wy] = cam.toWorld(input.mouse.x, input.mouse.y);
  p.facing = Math.atan2(wy - p.y, wx - p.x);

  // 噪音与隐蔽
  p.noise = moving ? 0.3 : 0.05;
  if (env.leaf) p.noise += 0.25;
  if (game.equipment.detectorActive) p.noise += Math.min(0.6, game.equipment.detectorExposure * 0.2);
  p.concealment = cfg.conceal + env.concealBonus;
  if (world.isTunnelAt(p.x, p.y)) p.concealment += 0.3;
  if (inSmoke(game, p.x, p.y)) p.concealment += 0.4;
  p.concealment = Math.min(0.95, p.concealment);

  // 水源（夏季）
  if (env.waterActive) {
    if (p.hasWaterGem) p.water = MAX_WATER;
    else {
      p.water -= WATER_DRAIN * dt;
      if (nearWater(world, p.x, p.y)) p.water = Math.min(MAX_WATER, p.water + WATER_DRAIN * 3 * dt);
      p.water = Math.max(0, p.water);
    }
  } else p.water = MAX_WATER;

  // 武器冷却
  for (const w of p.weapons) if (w.cd > 0) w.cd -= dt;
  if (p._emptyT > 0) p._emptyT -= dt;

  // 开火 / 放陷阱
  const w = p.weapons[p.curWeapon];
  if (input.mouse.down && w) {
    if (w.kind === 'trap') {
      if (input.mouse.justDown) game.placeTrap(p);
    } else {
      const r = fireWeapon(p, wx, wy, game.combatCtx());
      if (r.fired && r.noise) game.alertNearby(p, r.noise);
      if (r.empty && (p._emptyT || 0) <= 0) { game.toast('⌚ 弹药耗尽！按 B 进商店补给'); p._emptyT = 2.5; }
    }
  }

  // 切换武器
  for (let i = 0; i < p.weapons.length; i++) {
    if (input.pressed(String(i + 1)) && p.curWeapon !== i) {
      p.curWeapon = i;
      p.weaponSwitchT = 0.5;
      game.toast(`切换武器：${p.weapons[i].name}`);
    }
  }
  // 放陷阱（空格）
  if (input.pressed(' ')) game.placeTrap(p);

  // 装备快捷键
  if (input.pressed('q')) game.toggleDetector();
  if (input.pressed('r')) game.identify();
  if (input.pressed('e')) game.reportFake();
  if (input.pressed('b')) game.toggleShop();
}

}

function pickMelee(e) {
  const i = e.weapons.findIndex((w) => w.kind === 'melee');
  return i >= 0 ? i : e.curWeapon;
}

// 敌人是否察觉目标（季节/隐蔽/噪音/视线综合）
function canSee(game, e, target) {
  const env = game.season.env();
  const cfg = game.teamCfg(e.team);
  let range = DETECT_BASE * env.detectMult * cfg.detectMult * (1 + target.noise * 0.8);
  const d = Math.hypot(target.x - e.x, target.y - e.y);
  if (d > range) return false;
  if (inSmoke(game, target.x, target.y)) return false;
  const concealFactor = 1 - target.concealment * (1 - d / range) * 0.9;
  if (game.rng.next() > concealFactor) return false;
  if (game.world.lineBlockedSight(e.x, e.y, target.x, target.y)) return false;
  return true;
}

// 在敌方视野内挑选最近的我方单位（玩家或队友）作为目标
function pickTarget(game, e) {
  let best = null, bestD = Infinity;
  const foes = [game.player, ...game.allies];
  for (const t of foes) {
    if (!t || !t.alive) continue;
    if (!canSee(game, e, t)) continue;
    const d = Math.hypot(t.x - e.x, t.y - e.y);
    if (d < bestD) { bestD = d; best = t; }
  }
  return best;
}

function updateEnemy(game, e, dt) {
  if (!e.alive) return;
  const env = game.season.env();
  const cfg = game.teamCfg(e.team);
  const player = game.player;
  const ai = e.ai;
  const sees = pickTarget(game, e);

  if (sees) { ai.state = 'chase'; ai.target = sees; ai.lost = 0; }
  else if (ai.state === 'chase') { ai.lost += dt; if (ai.lost > 3) ai.state = 'patrol'; }

  for (const w of e.weapons) if (w.cd > 0) w.cd -= dt;

  let tx, ty;
  if (ai.state === 'chase' && ai.target && ai.target.alive) {
    tx = ai.target.x; ty = ai.target.y;
  } else if (ai.raider && game.bases[player.team].hp > 0) {
    const b = BASE[player.team];
    tx = (b.tx + b.tw / 2) * TILE; ty = (b.ty + b.th / 2) * TILE;
  } else {
    ai.timer -= dt;
    if (ai.timer <= 0) {
      ai.timer = game.rng.range(1.5, 3.5);
      ai.wx = ai.homeX + game.rng.range(-130, 130);
      ai.wy = ai.homeY + game.rng.range(-130, 130);
    }
    tx = ai.wx ?? e.x; ty = ai.wy ?? e.y;
  }

  const dx = tx - e.x, dy = ty - e.y, d = Math.hypot(dx, dy);
  let speed = ENEMY_BASE_SPEED * cfg.speedMult * (env.snow ? 0.8 : 1);
  if (d > 4) {
    const nx = dx / d, ny = dy / d;
    if (!game.world.blocksMove(e.x + nx * speed * dt, e.y)) e.x += nx * speed * dt;
    if (!game.world.blocksMove(e.x, e.y + ny * speed * dt)) e.y += ny * speed * dt;
    e.facing = Math.atan2(dy, dx);
  }

  e.noise = ai.state === 'chase' ? 0.4 : 0.1;
  if (env.leaf) e.noise += 0.2;
  e.concealment = Math.min(0.95, cfg.conceal + env.concealBonus
    + (game.world.isTunnelAt(e.x, e.y) ? 0.3 : 0) + (inSmoke(game, e.x, e.y) ? 0.4 : 0));

  // 攻击
  if (ai.state === 'chase' && ai.target && ai.target.alive) {
    const w = e.weapons[e.curWeapon];
    const dist = Math.hypot(ai.target.x - e.x, ai.target.y - e.y);
    if (w.kind === 'melee' && dist > w.range) e.curWeapon = pickRanged(e);
    else if (w.kind !== 'melee' && dist <= w.range * 0.5 && hasMelee(e)) e.curWeapon = pickMelee(e);
    const cw = e.weapons[e.curWeapon];
    if (dist <= (cw.range || 60) && cw.cd <= 0) {
      const r = fireWeapon(e, ai.target.x, ai.target.y, game.combatCtx());
      if (r.fired && r.noise) game.alertNearby(e, r.noise);
    }
  }

  // 美国袭击者破坏玩家基地
  if (ai.raider && game.bases[player.team].hp > 0) {
    const b = BASE[player.team];
    const cx = (b.tx + b.tw / 2) * TILE, cy = (b.ty + b.th / 2) * TILE;
    if (Math.hypot(e.x - cx, e.y - cy) < (b.tw * TILE) / 2) {
      game.combat.damageBase(player.team, 3.5 * dt); // 原8*dt，降低一半
    }
  }

  // 中国队布陷阱
  if (e.team === 'china' && e.traps > 0 && game.rng.chance(0.002)) game.placeTrap(e);
}

function hasMelee(e) { return e.weapons.some((w) => w.kind === 'melee'); }

// ===== entities/allyAI.js =====



function pickRanged(u) {
  const i = u.weapons.findIndex((w) => w.kind === 'ranged');
  return i >= 0 ? i : u.curWeapon;
}

// 队友 AI：发现敌人则迎击，否则跟随玩家
function updateAlly(game, a, dt) {
  if (!a.alive) return;
  const env = game.season.env();
  const cfg = game.teamCfg(a.team);
  const player = game.player;
  const ai = a.ai;

  // 寻找视野内最近的敌人
  let target = null, bestD = Infinity;
  for (const e of game.enemies) {
    if (!e.alive) continue;
    if (!canSee(game, a, e)) continue;
    const d = Math.hypot(e.x - a.x, e.y - a.y);
    if (d < bestD) { bestD = d; target = e; }
  }
  ai.state = target ? 'chase' : 'follow';

  for (const w of a.weapons) if (w.cd > 0) w.cd -= dt;
  if (a.muzzle > 0) a.muzzle -= dt;
  if (a.weaponSwitchT > 0) a.weaponSwitchT -= dt;

  let tx, ty;
  if (target) {
    tx = target.x; ty = target.y;
  } else {
    const dpx = player.x - a.x, dpy = player.y - a.y;
    const dp = Math.hypot(dpx, dpy);
    if (dp > 80) { tx = player.x; ty = player.y; }   // 离玩家太远 → 跟随
    else {
      ai.timer -= dt;
      if (ai.timer <= 0) {
        ai.timer = 1.5 + Math.random() * 1.5;
        ai.wx = a.x + (Math.random() * 130 - 65);
        ai.wy = a.y + (Math.random() * 130 - 65);
      }
      tx = ai.wx ?? a.x; ty = ai.wy ?? a.y;
    }
  }

  const dx = tx - a.x, dy = ty - a.y, d = Math.hypot(dx, dy);
  let speed = ENEMY_BASE_SPEED * cfg.speedMult * (env.snow ? 0.85 : 1) * 0.95;
  if (d > 4) {
    const nx = dx / d, ny = dy / d;
    if (!game.world.blocksMove(a.x + nx * speed * dt, a.y)) a.x += nx * speed * dt;
    if (!game.world.blocksMove(a.x, a.y + ny * speed * dt)) a.y += ny * speed * dt;
    a.facing = Math.atan2(dy, dx);
  }
  a.walkPhase += (d > 4 ? dt * 10 : 0);

  a.noise = ai.state === 'chase' ? 0.35 : 0.08;
  if (env.leaf) a.noise += 0.15;
  a.concealment = Math.min(0.95, cfg.conceal + env.concealBonus
    + (game.world.isTunnelAt(a.x, a.y) ? 0.3 : 0) + (inSmokeSafe(game, a.x, a.y) ? 0.4 : 0));

  // 开火攻击
  if (target && target.alive) {
    const w = a.weapons[a.curWeapon];
    const dist = Math.hypot(target.x - a.x, target.y - a.y);
    if (w.kind === 'melee' && dist > w.range) { const i = pickRanged(a); if (i >= 0) a.curWeapon = i; }
    else if (w.kind !== 'melee' && dist <= w.range * 0.5 && hasMelee(a)) a.curWeapon = a.weapons.findIndex((x) => x.kind === 'melee');
    const cw = a.weapons[a.curWeapon];
    if (dist <= (cw.range || 60) && cw.cd <= 0) {
      const r = fireWeapon(a, target.x, target.y, game.combatCtx());
      if (r.fired && r.noise) game.alertNearby(a, r.noise);
    }
  }
}

function hasMelee(u) { return u.weapons.some((w) => w.kind === 'melee'); }
function inSmokeSafe(game, x, y) {
  for (const s of game.smokes) if (Math.hypot(s.x - x, s.y - y) <= s.r) return true;
  return false;
}

function drawBaseBar(ctx, x, y, team, game) {
  const base = game.bases[team];
  const c = team === 'china' ? COLORS.china : COLORS.usa;
  Render.text(ctx, team === 'china' ? '中国基地' : '美国基地', x, y + 10, c, 12);
  Render.healthBar(ctx, x, y + 14, 180, 8, base.hp / base.max, c);
}

function drawWeaponBar(ctx, game) {
  const p = game.player;
  if (!p) return;
  const n = p.weapons.length;
  const slot = 92, gap = 10;
  const totalW = n * slot + (n - 1) * gap;
  const x0 = game.vw / 2 - totalW / 2;
  const y0 = game.vh - slot - 16;
  for (let i = 0; i < n; i++) {
    const w = p.weapons[i];
    const x = x0 + i * (slot + gap);
    const active = i === p.curWeapon;
    const flash = active ? Math.max(0, p.weaponSwitchT) / 0.5 : 0;
    const bg = active ? 'rgba(31,157,107,0.95)' : 'rgba(30,36,44,0.8)';
    Render.rect(ctx, x, y0, slot, slot, bg);
    const bw = active ? 3 + flash * 4 : 1.5;
    const bc = active ? `rgba(120,255,200,${0.7 + 0.3 * flash})` : 'rgba(120,140,160,0.5)';
    Render.strokeRect(ctx, x, y0, slot, slot, bc, bw);
    drawWeaponIcon(ctx, x + slot / 2, y0 + 30, w, active);
    Render.text(ctx, w.name, x + slot / 2, y0 + slot - 8, active ? '#eafff4' : '#aab', 13, 'center');
    Render.text(ctx, String(i + 1), x + 10, y0 + 16, active ? '#bfffe9' : '#889', 12, 'left');
    // 弹药 / 类型 醒目显示
    if (w.kind === 'trap') {
      Render.text(ctx, '陷阱×' + game.player.traps, x + slot / 2, y0 + slot - 26, active ? '#ffd76b' : '#9a9', 13, 'center');
    } else if (w.ammoMax) {
      const low = w.ammo <= 0, ratio = w.ammo / w.ammoMax;
      const col = low ? '#ff6b6b' : (ratio < 0.3 ? '#ffd166' : '#bfffe9');
      Render.text(ctx, w.ammo + '/' + w.ammoMax, x + slot / 2, y0 + slot - 26, col, 14, 'center');
    } else {
      Render.text(ctx, '近战', x + slot / 2, y0 + slot - 26, active ? '#bfffe9' : '#889', 12, 'center');
    }
  }
}

function drawWeaponIcon(ctx, cx, cy, w, active) {
  const col = active ? '#eafff4' : '#cdd';
  if (w.kind === 'melee') {
    Render.line(ctx, cx - 13, cy + 11, cx + 13, cy - 11, col, 4);
  } else if (w.kind === 'ranged') {
    Render.rect(ctx, cx - 15, cy - 3, 30, 6, col);
  } else if (w.kind === 'thrown') {
    Render.circle(ctx, cx, cy, 7, col);
  } else if (w.kind === 'trap') {
    Render.strokeCircle(ctx, cx, cy, 8, col, 2);
  }
}

  return overlay;

    </div>`;
  o.querySelector('#resume').onclick = () => { hideOverlay(); game.paused = false; };
  o.querySelector('#quit').onclick = () => { hideOverlay(); game.state = 'menu'; showStart(game); };
}

function showGameOver(game, win) {
  const o = ensureOverlay();
  o.innerHTML = `
    <div class="panel">
      <h1 style="color:${win ? '#2ecc71' : '#e74c3c'}">${win ? '胜利！' : '失败'}</h1>
      <p class="sub">${win ? '敌方基地已被摧毁，任务达成。' : '我方基地失守或单位全灭。'}</p>
      <p>击杀 ${game.stats.kills} · 破坏 ${Math.round(game.stats.raid)} · 宝石 ${game.stats.gems} · 信誉 ${game.reputation.value}</p>
      <button id="again" class="primary">再来一局</button>
    </div>`;
  o.querySelector('#again').onclick = () => { hideOverlay(); game.state = 'menu'; showStart(game); };
}

// 商店面板：解锁眼镜 / 宝石充电 / 升级发现器 / 升级武器（受信誉折扣）
class Shop {
  constructor(game) {
    this.game = game;
    this.el = document.createElement('div');
    this.el.id = 'shop';
    document.body.appendChild(this.el);
  }
  toggle() {
    const open = this.el.style.display !== 'flex';
    this.el.style.display = open ? 'flex' : 'none';
    if (open) this.render();
  }
  render() {
    const g = this.game, inv = g.inventory, eq = g.equipment, rep = g.reputation;
    const d = rep.discount();
    const glassesCost = Math.round(30 * d);
    const detInfo = eq.detectorLevel === 'C'
      ? '已是最高级'
      : `升级至 ${eq.detectorLevel === 'A' ? 'B' : 'C'}（${Math.round((eq.detectorLevel === 'A' ? 20 : 40) * d)}金）`;
    const w = g.player.weapons[g.player.curWeapon];
    const glassesState = eq.glassesUnlocked ? `已配发（电量${eq.glassesBattery}%）` : `解锁 ${glassesCost}金`;
    this.el.innerHTML = `
      <div class="panel">
        <h2>商店（信誉折扣 ×${d}）　持有：💎宝石${inv.gems}　金${inv.gold} 银${inv.silver} 铜${inv.copper}</h2>
        <div class="shoprow"><span>眼科技眼镜（鉴定假金）</span><button data-a="unlock">${glassesState}</button></div>
        <div class="shoprow"><span>宝石充电（眼镜电量充满）</span><button data-a="charge">用1宝石</button></div>
        <div class="shoprow"><span>宝石发现器精度</span><button data-a="updet">${detInfo}</button></div>
        <div class="shoprow"><span>升级武器[${g.player.curWeapon + 1}]${w.name}（伤害+6）</span><button data-a="upw">${Math.round(15 * d)}金</button></div>
        <div class="shoprow"><span>宝石补给：全武器弹药补满</span><button data-a="gemammo">用2宝石</button></div>
        <button data-a="close" class="primary">关闭 (B)</button>
      </div>`;
    this.el.querySelectorAll('button').forEach((b) => {
      b.onclick = () => { this.act(b.dataset.a); this.render(); };
    });
  }
  act(a) {
    const g = this.game, inv = g.inventory, eq = g.equipment, rep = g.reputation;
    const d = rep.discount();
    if (a === 'unlock') {
      if (eq.glassesUnlocked) g.toast('眼镜已配发');
      else g.toast(eq.unlockGlasses(inv).msg);
    } else if (a === 'charge') g.toast(eq.chargeGlasses(inv).msg);
    else if (a === 'updet') g.toast(eq.upgradeDetector(inv).msg);
    else if (a === 'upw') {
      const cost = Math.round(15 * d), w = g.player.weapons[g.player.curWeapon];
      if (inv.gold < cost) g.toast('金币不足');
      else { inv.gold -= cost; w.dmg += 6; w.noise *= 0.9; g.toast(`${w.name} 升级！伤害${w.dmg}`); }
    } else if (a === 'gemammo') {
      if (inv.gems < 2) g.toast('宝石不足（需2）');
      else {
        inv.gems -= 2;
        for (const w of g.player.weapons) if (w.ammoMax) w.ammo = w.ammoMax;
        g.toast('💎 全武器弹药已补满');
      }
    } else if (a === 'close') this.toggle();
  }
}

class Game {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.input = new Input(canvas);
    this.camera = new Camera(this.vw, this.vh);
    this.rng = makeRNG();
    this.state = 'menu';
    this.paused = false;
    this.time = 0;
    this.messages = [];
    this.shop = new Shop(this);
    // 宝石捡取按钮（DOM）
    this.pickupEl = document.createElement('button');
    this.pickupEl.id = 'pickupBtn';
    this.pickupEl.style.display = 'none';
    this.pickupEl.textContent = '💎 挖出宝石（收入账号）';
    this.pickupEl.onclick = () => this.onPickupClick();
    document.body.appendChild(this.pickupEl);
    showStart(this);
    startLoop((dt) => this.update(dt), () => this.render());
  }

  resize() {
    this.vw = this.canvas.width = window.innerWidth;
    this.vh = this.canvas.height = window.innerHeight;
    if (this.camera) { this.camera.vw = this.vw; this.camera.vh = this.vh; }
  }

  foe() { return this.team === 'china' ? 'usa' : 'china'; }
  teamCfg(t) { return TEAMS[t]; }
  allUnits() { return [this.player, ...this.allies, ...this.enemies].filter((u) => u.alive); }
  combatCtx() {
    return { units: this.allUnits(), world: this.world, projectiles: this.projectiles, smokes: this.smokes, combat: this.combat, game: this };
  }

  start(team, goal) {
    this.team = team; this.goal = goal;
    this.world = createWorld(this.rng.int(1, 1e9));
    this.season = new SeasonManager((s) => this.onSeasonChange(s));
    this.equipment = new Equipment();
    this.equipment.glassesUnlocked = true; this.equipment.glassesBattery = 100; // 开局免费配发眼镜，按R即可鉴定
    this.inventory = new Inventory();
    this.reputation = new Reputation();
    this.tasks = new TaskManager();
    this.combat = new Combat(this);
    this.projectiles = []; this.smokes = []; this.traps = []; this.items = []; this.treeFalls = [];
    this.allies = []; // 我方AI队友
    this.bases = { china: { hp: 500, max: 500 }, usa: { hp: 500, max: 500 } };
    this.stats = { kills: 0, raid: 0, gems: 0, fake: 0 };
    this.time = 0;

    const b = BASE[team];
    this.player = new Unit(team, (b.tx + b.tw / 2) * TILE, (b.ty + b.th / 2) * TILE, true);
    this.player.curWeapon = 1; // 开局默认持远程武器
    this.player.maxHp = 160; this.player.hp = 160; // 玩家血量加厚
    // 初始弹药补满
    this.player.weapons.forEach((w) => { if (w.ammoMax) w.ammo = w.ammoMax; });
    // 初始资源，让新手有升级空间
    this.inventory.addResource('gold', 30);
    this.inventory.addResource('silver', 20);
    this.enemies = this.spawnEnemies();
    this.allies = this.spawnAllies();
    this.items = populateItems(this.world, this.rng);

    this.tasks.addTask(TASK_TEMPLATES[0]);
    this.tasks.addTask(TASK_TEMPLATES[2]);
    this.state = 'playing';
    this.paused = false;
    this.pickupEl.style.display = 'none';
    this.camera.follow(this.player.x, this.player.y);
    this.toast(`你执掌${TEAMS[team].name}，目标：${goal === 'destroy' ? '摧毁敌基地' : '累计资源200'}`);
  }

  spawnEnemies() {
    const foe = this.foe();
    const b = BASE[foe];
    const arr = [];
    for (let i = 0; i < 5; i++) { // 原来是8个敌人，减到5降低压迫感
      const ex = (b.tx + this.rng.range(0, b.tw)) * TILE;
      const ey = (b.ty + this.rng.range(0, b.th)) * TILE;
      const e = new Unit(foe, ex, ey);
      e.maxHp = ENEMY_HP; e.hp = ENEMY_HP; // 保证我方3次命中击杀
      e.weapons.forEach((w) => (w.ammo = 9999));
      e.ai.homeX = ex; e.ai.homeY = ey;
      if (foe === 'usa' && i < 2) e.ai.raider = true; // 袭击者从3减到2
      if (foe === 'china') e.traps = 2;
      e.name = (foe === 'china' ? '中国兵' : '美军') + (i + 1);
      arr.push(e);
    }
    return arr;
  }

  // 我方AI队友：开局在基地附近生成2人，跟随玩家并主动迎敌
  spawnAllies() {
    const team = this.team;
    const b = BASE[team];
    const arr = [];
    for (let i = 0; i < 2; i++) {
      const ax = (b.tx + this.rng.range(1, b.tw - 1)) * TILE;
      const ay = (b.ty + this.rng.range(1, b.th - 1)) * TILE;
      const a = new Unit(team, ax, ay);
      a.isPlayer = false;
      a.maxHp = ALLY_HP; a.hp = ALLY_HP;
      a.weapons.forEach((w) => { if (w.ammoMax) w.ammo = w.ammoMax; });
      a.ai.homeX = ax; a.ai.homeY = ay; a.ai.timer = 0; a.ai.state = 'follow';
      a.name = '队友' + (i + 1);
      arr.push(a);
    }
    return arr;
  }

  // ===== 主循环 =====
  update(dt) {
    if (this.state !== 'playing') return;
    if (this.input.pressed('escape') || this.input.pressed('p')) this.togglePause();
    if (this.paused) { this.input.endFrame(); return; }

    this.time += dt;
    this.season.update(dt);
    this.equipment.update(dt);
    updatePlayer(this, dt);
    for (const e of this.enemies) updateEnemy(this, e, dt);
    for (const a of this.allies) updateAlly(this, a, dt);
    updateProjectiles(this.combatCtx(), dt);
    this.updateTraps();
    this.updateSmokes(dt);
    this.updateTreeFalls(dt);
    this.revealBuried();
    this.pickupItems();

    // 计时器衰减
    if (this.player.muzzle > 0) this.player.muzzle -= dt;
    if (this.player.weaponSwitchT > 0) this.player.weaponSwitchT -= dt;
    for (const e of this.enemies) {
      if (e.muzzle > 0) e.muzzle -= dt;
      if (e.weaponSwitchT > 0) e.weaponSwitchT -= dt;
    }
    for (const a of this.allies) {
      if (a.muzzle > 0) a.muzzle -= dt;
      if (a.weaponSwitchT > 0) a.weaponSwitchT -= dt;
    }

    const eb = BASE[this.foe()];
    if (this.player.alive && this.inRect(this.player.x, this.player.y, eb)) {
      this.combat.damageBase(this.foe(), 45 * dt); // 原30，加快以匹配更高的基地HP
    }
    if (this.goal === 'collect' && this.inventory.total() >= 200) return this.win();
    if (!this.player.alive) return this.lose();

    const msgs = this.tasks.update(this.inventory, this.reputation);
    msgs.forEach((m) => this.toast(m));

    for (const m of this.messages) m.t -= dt * 0.5;
    this.messages = this.messages.filter((m) => m.t > 0);

    this.updatePickupButton();
    this.camera.follow(this.player.x, this.player.y);
    this.input.endFrame();
  }

  // ===== 系统回调 =====
  toast(msg) {
    this.messages.push({ text: msg, t: 4 });
    if (this.messages.length > 8) this.messages.shift();
  }

  // 树木被击倒时的视觉特效（碎片飞溅 + 木屑）
  addTreeFallFX(x, y) {
    const fx = { x, y, life: 0.8, particles: [] };
    for (let i = 0; i < 12; i++) {
      const ang = (Math.PI * 2 * i / 12) + Math.random() * 0.5;
      const spd = 40 + Math.random() * 80;
      fx.particles.push({
        ox: 0, oy: 0,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd - 30,
        size: 2 + Math.random() * 3,
        color: Math.random() > 0.5 ? '#5a3d1a' : '#8b6914',
      });
    }
    this.treeFalls.push(fx);
  }
  placeTrap(unit) {
    if (unit.traps > 0) {
      this.traps.push(makeTrap(unit.team, unit.x, unit.y));
      unit.traps--;
      this.toast('已布置陷阱');
    } else this.toast('没有可用陷阱');
  }
  toggleDetector() {
    this.equipment.toggleDetector();
    this.toast(`宝石发现器${this.equipment.detectorActive ? '开启（有暴露风险）' : '关闭'}`);
  }
  identify() {
    const r = this.inventory.identifyAll(this.equipment, this.reputation);
    this.toast(r.msg);
  }
  reportFake() {
    if (this.inventory.fakeGold > 0) {
      this.inventory.fakeGold--; this.reputation.gain(5);
      this.toast('上报假金：信誉+5，老板好感提升');
    } else this.toast('没有已确认的假金');
  }
  toggleShop() { this.shop.toggle(); }
  togglePause() {
    if (!this.paused) { this.paused = true; showPause(this); }
    else { this.paused = false; hideOverlay(); }
  }
  alertNearby(unit, noise) {
    const range = 150 + noise * 300;
    for (const e of this.enemies) {
      if (dist(e.x, e.y, unit.x, unit.y) < range) { e.ai.state = 'chase'; e.ai.target = this.player; }
    }
  }
  onUnitKilled(u) {
    if (u === this.player) return this.lose();
    if (u.isPlayer) return this.lose();
    if (u.team === this.foe()) {
      this.stats.kills++;
      this.tasks.event('kill', 1);
    } else if (u.team === this.team) {
      this.toast(`💥 ${u.name || '队友'} 阵亡！`);
    }
  }
  onBaseDestroyed(team) {
    if (team === this.foe()) return this.win();
    if (team === this.team) return this.lose();
  }
  onSeasonChange(season) {
    spawnSeasonTreasure(season, this.world, this.rng, this.items);
    const name = { spring: '春', summer: '夏', autumn: '秋', winter: '冬' }[season];
    this.toast(`进入${name}季 · 出现季节宝物（夏：无限水源宝石 / 冬：雪地摩托）`);
  }

  // ===== 物品与陷阱 =====
  revealBuried() {
    if (!this.equipment.detectorActive) return;
    const r = this.equipment.detectorRadius();
    for (const it of this.items) {
      if (it.buried && !it.taken && !it.revealed && dist(this.player.x, this.player.y, it.x, it.y) <= r) it.revealed = true;
    }
  }
  // 普通（非埋藏）物品自动拾取；埋藏宝石由按钮拾取
  pickupItems() {
    for (const it of this.items) {
      if (it.taken || it.buried) continue;
      if (dist(this.player.x, this.player.y, it.x, it.y) <= this.player.radius + 12) {
        it.taken = true;
        this.collect(it);
      }
    }
    this.items = this.items.filter((i) => !i.taken);
  }
  collect(it) {
    const inv = this.inventory;
    switch (it.type) {
      case 'gold': inv.pickSuspect(false); this.tasks.event('collect', 1); this.toast('拾得可疑金（按R鉴定）'); break;
      case 'fakeGold': inv.pickSuspect(true); this.tasks.event('collect', 1); this.toast('拾得可疑金（按R鉴定）'); break;
      case 'silver': case 'copper': inv.addResource(it.type, 1); this.tasks.event('collect', 1); this.toast(`拾得${it.type}`); break;
      case 'gem': inv.addResource('gem', 1); this.stats.gems++; this.tasks.event('gem', 1); this.toast('💎 宝石已收入账号'); break;
      case 'waterGem': this.player.hasWaterGem = true; this.toast('获得【无限水源宝石】夏季不再缺水'); break;
      case 'snowmobile': this.player.hasSnowmobile = true; this.toast('获得【雪地摩托】冬季移速大增'); break;
    }
  }
  // 最近的、已发现且可挖的埋藏宝石
  nearbyGem() {
    let best = null, bd = 1e9;
    for (const it of this.items) {
      if (it.taken || it.type !== 'gem' || !it.buried || !it.revealed) continue;
      const d = dist(this.player.x, this.player.y, it.x, it.y);
      if (d <= this.player.radius + 40 && d < bd) { bd = d; best = it; }
    }
    return best;
  }
  // 探测范围内（无论是否开启发现器）最近的埋藏宝石，用于提示
  nearestBuriedGem(r) {
    let best = null, bd = 1e9;
    for (const it of this.items) {
      if (it.taken || it.type !== 'gem' || !it.buried) continue;
      const d = dist(this.player.x, this.player.y, it.x, it.y);
      if (d <= r && d < bd) { bd = d; best = it; }
    }
    return best;
  }
  updatePickupButton() {
    const g = this.nearbyGem();
    this.pickupEl.style.display = g ? 'block' : 'none';
  }
  onPickupClick() {
    const g = this.nearbyGem();
    if (g) {
      g.taken = true;
      this.collect(g);
      this.pickupEl.style.display = 'none';
    }
  }
  updateTraps() {
    for (const tr of this.traps) {
      if (!tr.armed) continue;
      const list = tr.team === this.player.team ? this.enemies : [this.player];
      for (const u of list) {
        if (u.alive && dist(u.x, u.y, tr.x, tr.y) <= tr.radius + u.radius) {
          this.combat.damage(u, tr.dmg);
          tr.armed = false;
          this.toast('陷阱触发！');
          break;
        }
      }
    }
    this.traps = this.traps.filter((t) => t.armed);
  }
  updateSmokes(dt) {
    for (const s of this.smokes) s.life -= dt;
    this.smokes = this.smokes.filter((s) => s.life > 0);
  }
  updateTreeFalls(dt) {
    for (const fx of this.treeFalls) {
      fx.life -= dt;
      for (const p of fx.particles) {
        p.ox += p.vx * dt; p.oy += p.vy * dt;
        p.vy += 120 * dt; // 重力
      }
    }
    this.treeFalls = this.treeFalls.filter((f) => f.life > 0);
  }
  inRect(x, y, b) {
    const px = b.tx * TILE, py = b.ty * TILE, w = b.tw * TILE, h = b.th * TILE;
    return x >= px && x <= px + w && y >= py && y <= py + h;
  }
  win() { this.state = 'over'; this.pickupEl.style.display = 'none'; showGameOver(this, true); }
  lose() { this.state = 'over'; this.pickupEl.style.display = 'none'; showGameOver(this, false); }

  // ===== 渲染 =====
  render() {
    const ctx = this.ctx;
    ctx.fillStyle = '#0d1014';
    ctx.fillRect(0, 0, this.vw, this.vh);
    if (this.state === 'menu') return;

    // 像素卡通：世界先渲染到低分辨率离屏画布，再以整数倍无平滑放大贴回主画布
    const bw = Math.ceil(this.vw / PIXEL), bh = Math.ceil(this.vh / PIXEL);
    if (!this._buf || this._buf.width !== bw || this._buf.height !== bh) {
      this._buf = document.createElement('canvas');
      this._buf.width = bw; this._buf.height = bh;
    }
    const b = this._buf.getContext('2d');
    b.setTransform(1 / PIXEL, 0, 0, 1 / PIXEL, 0, 0);
    b.imageSmoothingEnabled = false;
    b.fillStyle = COLORS.ground;
    b.fillRect(0, 0, this.vw, this.vh);
    this.drawWorld(b);

    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(this._buf, 0, 0, bw, bh, 0, 0, this.vw, this.vh);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.imageSmoothingEnabled = true;

    drawHUD(ctx, this);
  }

  drawWorld(ctx) {
    const cam = this.camera;
    const env = this.season.env();
    const snow = env.snow;
    const x0 = Math.max(0, Math.floor(cam.x / TILE));
    const y0 = Math.max(0, Math.floor(cam.y / TILE));
    const x1 = Math.min(MAP_W, Math.ceil((cam.x + this.vw) / TILE));
    const y1 = Math.min(MAP_H, Math.ceil((cam.y + this.vh) / TILE));

    // ---- 第一层：地面底色（扁平双色像素棋盘）----
    const g1 = snow ? COLORS.groundWinter : COLORS.ground;
    const g2 = snow ? COLORS.groundWinterAlt : COLORS.groundAlt;
    for (let ty = y0; ty < y1; ty++) {
      for (let tx = x0; tx < x1; tx++) {
        const c = this.world.grid[ty][tx];
        if (c === T.TREE || c === T.BASE_C || c === T.BASE_U || c === T.WATER) continue;
        const sx = tx * TILE - cam.x, sy = ty * TILE - cam.y;
        ctx.fillStyle = ((tx + ty) & 1) ? g1 : g2;
        ctx.fillRect(sx, sy, TILE, TILE);
        // 岩石
        if (c === T.ROCK) drawRock(ctx, sx, sy, snow);
        // 河床
        else if (c === T.RIVERBED) { ctx.fillStyle = COLORS.riverbed; ctx.fillRect(sx, sy, TILE, TILE); }
      }
    }

    // ---- 水域：带渐变的湖泊 ----
    for (let ty = y0; ty < y1; ty++) {
      for (let tx = x0; tx < x1; tx++) {
        if (this.world.grid[ty][tx] !== T.WATER) continue;
        const sx = tx * TILE - cam.x, sy = ty * TILE - cam.y;
        drawLakeTile(ctx, sx, sy, tx, ty);
      }
    }

    // ---- 基地区域：带建筑感 ----
    for (let ty = y0; ty < y1; ty++) {
      for (let tx = x0; tx < x1; tx++) {
        const c = this.world.grid[ty][tx];
        const isChina = c === T.BASE_C, isUSA = c === T.BASE_U;
        if (!isChina && !isUSA) continue;
        const sx = tx * TILE - cam.x, sy = ty * TILE - cam.y;
        drawBaseTile(ctx, sx, sy, tx, ty, isChina ? 'china' : 'usa', snow);
      }
    }

    // ---- 树木：真正的树形（阴影+树干+多层树冠）----
    for (let ty = y0; ty < y1; ty++) {
      for (let tx = x0; tx < x1; tx++) {
        if (this.world.grid[ty][tx] !== T.TREE) continue;
        const sx = tx * TILE - cam.x, sy = ty * TILE - cam.y;
        drawTree(ctx, sx, sy, tx, ty, snow, env);
      }
    }

    // ---- 地道标记 ----
    for (let ty = y0; ty < y1; ty++) {
      for (let tx = x0; tx < x1; tx++) {
        if (!this.world.isTunnelAt(tx * TILE + 2, ty * TILE + 2)) continue;
        const sx = tx * TILE - cam.x, sy = ty * TILE - cam.y;
        Render.strokeRect(ctx, sx + 3, sy + 3, TILE - 6, TILE - 6, 'rgba(120,160,255,0.35)', 1);
      }
    }

    // ---- 进入敌方阵地效果（红边框+警告）----
    this.drawEnemyTerritoryEffect(ctx);

    // ---- 物品、特效、单位（保持原有逻辑）----
    // 普通（非埋藏）物品：像素方块 + 白描边
    for (const it of this.items) {
      if (it.buried) continue;
      const [isx, isy] = cam.toScreen(it.x, it.y);
      const col = itemColor(it.type);
      ctx.fillStyle = col;
      ctx.fillRect(isx - 6, isy - 6, 12, 12);
      ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 1;
      ctx.strokeRect(isx - 6, isy - 6, 12, 12);
    }
    // 宝石发现器扫描特效 + 已发现宝石标记
    this.drawGemFX(ctx, cam);
    // 烟雾
    for (const s of this.smokes) {
      const [ssx, ssy] = cam.toScreen(s.x, s.y);
      ctx.fillStyle = `rgba(200,200,200,${Math.min(0.6, s.life / 6)})`;
      ctx.beginPath(); ctx.arc(ssx, ssy, s.r, 0, Math.PI * 2); ctx.fill();
    }
    // 树木倒下特效（碎片飞溅）
    for (const tf of this.treeFalls) {
      const [tfx, tfy] = cam.toScreen(tf.x, tf.y);
      const alpha = Math.min(1, tf.life / 0.8);
      for (const p of tf.particles) {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = alpha;
        ctx.fillRect(tfx + p.ox - p.size/2, tfy + p.oy - p.size/2, p.size, p.size);
      }
      ctx.globalAlpha = 1;
    }
    // 陷阱
    for (const tr of this.traps) {
      if (tr.team !== this.player.team) continue;
      const [tsx, tsy] = cam.toScreen(tr.x, tr.y);
      Render.circle(ctx, tsx, tsy, 5, '#d4a');
      Render.strokeCircle(ctx, tsx, tsy, 8, 'rgba(212,68,170,0.4)', 1);
    }
    // 抛射物
    for (const p of this.projectiles) drawProjectile(ctx, cam, p);
    // 单位：玩家 + 队友 + 敌人，全部人形像素造型
    for (const u of [this.player, ...this.allies, ...this.enemies]) {
      if (!u.alive) continue;
      const [usx, usy] = cam.toScreen(u.x, u.y);
      drawHumanoid(ctx, usx, usy, u, this.time, this.team);
    }
  }

  // 敌方阵地视觉效果：红色警告边框 + 屏幕泛红 + 文字提示
  drawEnemyTerritoryEffect(ctx) {
    const eb = BASE[this.foe()];
    if (!this.player.alive || !this.inRect(this.player.x, this.player.y, eb)) return;
    const vw = this.vw, vh = this.vh;
    const pulse = 0.5 + 0.5 * Math.sin(this.time * 4);
    // 四周边框红闪
    const bw = 6 + pulse * 8;
    ctx.fillStyle = `rgba(220,40,40,${0.35 + pulse * 0.25})`;
    ctx.fillRect(0, 0, vw, bw);       // 上
    ctx.fillRect(0, vh - bw, vw, bw);  // 下
    ctx.fillRect(0, 0, bw, vh);       // 左
    ctx.fillRect(vw - bw, 0, bw, vh);  // 右
    // 角落斜线装饰
    ctx.strokeStyle = `rgba(255,100,80,${0.3 + pulse * 0.3})`;
    ctx.lineWidth = 3;
    const cl = 50;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(cl, 0); ctx.lineTo(0, cl); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(vw, 0); ctx.lineTo(vw - cl, 0); ctx.lineTo(vw, cl); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, vh); ctx.lineTo(cl, vh); ctx.lineTo(0, vh - cl); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(vw, vh); ctx.lineTo(vw - cl, vh); ctx.lineTo(vw, vh - cl); ctx.stroke();
    // 警告文字
    ctx.fillStyle = `rgba(255,60,60,${0.7 + pulse * 0.3})`;
    ctx.font = `bold ${18 + pulse * 4}px "PingFang SC", sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('⚠ 已进入敌方阵地！', vw / 2, 58);
    ctx.font = '13px "PingFang SC", sans-serif';
    ctx.fillStyle = `rgba(255,150,130,${0.6 + pulse * 0.3})`;
    ctx.fillText('正在破坏敌方基地… 持续造成伤害', vw / 2, 80);
  }

  // 宝石发现器扫描波纹 + 已发现宝石的明显标记
  drawGemFX(ctx, cam) {
    const detOn = this.equipment.detectorActive;
    if (detOn) {
      const [psx, psy] = cam.toScreen(this.player.x, this.player.y);
      const R = this.equipment.detectorRadius();
      // 探测半径圈
      Render.strokeCircle(ctx, psx, psy, R, 'rgba(120,220,255,0.25)', 1);
      // 扩散扫描波纹
      for (let k = 0; k < 3; k++) {
        const phase = (this.time * 0.8 + k / 3) % 1;
        Render.strokeCircle(ctx, psx, psy, R * phase, `rgba(120,220,255,${0.5 * (1 - phase)})`, 2);
      }
    }
    // 已发现的埋藏宝石：发光菱形 + 光柱 + 标签
    for (const it of this.items) {
      if (!(it.type === 'gem' && it.buried && it.revealed)) continue;
      const [sx, sy] = cam.toScreen(it.x, it.y);
      const pulse = 0.5 + 0.5 * Math.sin(this.time * 5);
      Render.line(ctx, sx, sy - 46, sx, sy + 6, `rgba(120,255,220,${0.22 + 0.2 * pulse})`, 6);
      Render.circle(ctx, sx, sy, 14 + pulse * 4, `rgba(120,255,220,${0.35 + 0.3 * pulse})`);
      drawDiamond(ctx, sx, sy, 9, '#39ffd0');
      Render.text(ctx, '💎 宝石', sx, sy - 26, '#bfffe9', 13, 'center');
    }
  }
}

function itemColor(type) {
  return {
    gold: COLORS.gold, silver: COLORS.silver, copper: COLORS.copper, gem: COLORS.gem,
    fakeGold: COLORS.fake, waterGem: '#39d0ff', snowmobile: '#ecf0f1',
  }[type] || '#fff';
}

function drawDiamond(ctx, x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y - r);
  ctx.lineTo(x + r * 0.8, y);
  ctx.lineTo(x, y + r);
  ctx.lineTo(x - r * 0.8, y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// 单位手持像素武器（随朝向旋转绘制）
function drawPixelWeapon(ctx, hx, hy, u, teamCol) {
  const w = u.weapons[u.curWeapon];
  ctx.save();
  ctx.translate(Math.round(hx), Math.round(hy));
  ctx.rotate(u.facing);
  if (w.kind === 'melee') {
    ctx.fillStyle = '#3a3f4a'; ctx.fillRect(0, -2, 17, 4);
    ctx.fillStyle = '#e8eef5'; ctx.fillRect(0, -1, 15, 2);
    ctx.fillStyle = '#caa24a'; ctx.fillRect(-3, -3, 3, 6);
  } else if (w.kind === 'ranged') {
    ctx.fillStyle = '#2b3038'; ctx.fillRect(0, -2, 19, 4);
    ctx.fillStyle = '#5a6470'; ctx.fillRect(2, -4, 9, 4);
    ctx.fillStyle = teamCol; ctx.fillRect(-2, -1, 3, 4);
  } else if (w.kind === 'thrown') {
    ctx.fillStyle = '#444'; ctx.fillRect(8, -4, 6, 6);
    ctx.fillStyle = '#e74'; ctx.fillRect(10, -2, 2, 2);
  } else if (w.kind === 'trap') {
    ctx.fillStyle = '#d4a'; ctx.fillRect(6, -4, 6, 6);
  }
  if (u.muzzle > 0) {
    ctx.fillStyle = 'rgba(255,230,120,0.9)'; ctx.fillRect(19, -3, 8, 6);
    ctx.fillStyle = '#fff'; ctx.fillRect(19, -1, 5, 2);
  }
  ctx.restore();
}

// 像素人形角色：头 + 躯干 + 四肢 + 武器，带队色与描边
function drawHumanoid(ctx, sx, sy, u, time, playerTeam) {
  const r = u.radius;
  const teamCol = u.team === 'china' ? COLORS.china : COLORS.usa;
  const outline = COLORS.outline;
  const skin = COLORS.skin;
  const cx = Math.round(sx);

  // 像素阴影
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.fillRect(cx - Math.round(r * 0.7), Math.round(sy + r - 1), Math.round(r * 1.4), 4);

  const moving = u.noise > 0.2;
  const bob = moving ? Math.round(Math.sin(time * 12 + u.x * 0.05) * 1.5) : 0;
  const cy = sy + bob;
  const feetY = Math.round(cy + r);
  const legH = 5, torsoH = 10, headH = 8, torsoW = 12, headW = 10;
  const torsoY = feetY - legH - torsoH;
  const headY = torsoY - headH;

  // 腿
  ctx.fillStyle = '#3a3f4a';
  ctx.fillRect(cx - 5, feetY - legH, 4, legH);
  ctx.fillRect(cx + 1, feetY - legH, 4, legH);
  // 躯干（队色 + 描边）
  ctx.fillStyle = outline;
  ctx.fillRect(cx - torsoW / 2 - 1, torsoY - 1, torsoW + 2, torsoH + 2);
  ctx.fillStyle = teamCol;
  ctx.fillRect(cx - torsoW / 2, torsoY, torsoW, torsoH);
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(cx - torsoW / 2, torsoY, torsoW, 3);
  // 头（皮肤 + 头盔 + 描边）
  ctx.fillStyle = outline;
  ctx.fillRect(cx - headW / 2 - 1, headY - 1, headW + 2, headH + 2);
  ctx.fillStyle = skin;
  ctx.fillRect(cx - headW / 2, headY, headW, headH);
  ctx.fillStyle = teamCol;
  ctx.fillRect(cx - headW / 2 - 1, headY - 1, headW + 2, 4);
  // 眼睛朝向前方
  ctx.fillStyle = '#222';
  const ex = Math.cos(u.facing) >= 0 ? 1 : -1;
  ctx.fillRect(cx + ex - 1, headY + 4, 2, 2);
  ctx.fillRect(cx + ex * 3 - 1, headY + 4, 2, 2);

  // 武器手臂
  drawPixelWeapon(ctx, cx, torsoY + 5, u, teamCol);

  // 玩家白环标识
  if (u.isPlayer) {
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
    ctx.strokeRect(cx - r - 1, headY - 2, (r + 1) * 2, feetY - headY + 4);
  }

  // 血条
  const bw2 = r * 2;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(cx - bw2 / 2 - 1, headY - 7, bw2 + 2, 5);
  ctx.fillStyle = u.hp / u.maxHp > 0.5 ? '#5fd35f' : (u.hp / u.maxHp > 0.25 ? '#ffd24a' : '#ff5a4a');
  ctx.fillRect(cx - bw2 / 2, headY - 6, bw2 * Math.max(0, u.hp / u.maxHp), 3);

  // 名字标签
  const isEnemy = u.team !== playerTeam;
  const label = u.isPlayer ? '你' : (isEnemy ? '敌' : '友');
  Render.text(ctx, label, cx, headY - 12, u.isPlayer ? '#fff' : teamCol, 10, 'center');
}

// 抛射物：像素方块 + 拖尾
function drawProjectile(ctx, cam, p) {
  const [sx, sy] = cam.toScreen(p.x, p.y);
  const isBullet = p.kind === 'bullet';
  for (let i = 1; i < p.trail.length; i++) {
    const a = i / p.trail.length;
    const [ax, ay] = cam.toScreen(p.trail[i - 1].x, p.trail[i - 1].y);
    const [bx, by] = cam.toScreen(p.trail[i].x, p.trail[i].y);
    ctx.strokeStyle = isBullet ? `rgba(255,235,140,${a * 0.9})` : `rgba(210,210,210,${a * 0.6})`;
    ctx.lineWidth = isBullet ? 4 : 3;
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
  }
  const core = isBullet ? '#fff7c2' : (p.kind === 'grenade' ? '#ff7a33' : '#dfe6ee');
  const sz = isBullet ? 5 : 6;
  ctx.fillStyle = core;
  ctx.fillRect(Math.round(sx - sz / 2), Math.round(sy - sz / 2), sz, sz);
}

// ========== 地图渲染辅助函数 ==========

// 画像素松树：阴影 + 树干 + 三层方块树冠
function drawTree(ctx, sx, sy, tx, ty, snow) {
  const seed = (tx * 31 + ty * 17) & 0xfff;
  const cx = sx + 20 + ((seed % 7) - 3);
  const baseY = sy + 38;
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(cx - 14, baseY - 2, 28, 4);
  ctx.fillStyle = COLORS.trunk;
  ctx.fillRect(cx - 3, baseY - 16, 6, 16);
  const g = snow ? [COLORS.treeSnow, '#aebfb5', COLORS.treeSnow] : [COLORS.treeDark, COLORS.treeMid, COLORS.treeLight];
  ctx.fillStyle = g[0]; ctx.fillRect(cx - 13, baseY - 30, 26, 14);
  ctx.fillStyle = g[1]; ctx.fillRect(cx - 10, baseY - 38, 20, 10);
  ctx.fillStyle = g[2]; ctx.fillRect(cx - 7, baseY - 45, 14, 9);
  ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(cx - 13, baseY - 18, 26, 2);
  if (snow) { ctx.fillStyle = '#fff'; ctx.fillRect(cx - 7, baseY - 45, 14, 3); }
}

// 画像素岩石
function drawRock(ctx, sx, sy, snow) {
  const cx = sx + 20, cy = sy + 24;
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(cx - 12, cy + 4, 24, 4);
  ctx.fillStyle = COLORS.rockDark; ctx.fillRect(cx - 12, cy - 10, 24, 16);
  ctx.fillStyle = COLORS.rock; ctx.fillRect(cx - 10, cy - 8, 20, 12);
  ctx.fillStyle = COLORS.rockLight; ctx.fillRect(cx - 10, cy - 8, 20, 4);
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; ctx.strokeRect(cx - 12, cy - 10, 24, 16);
}

// 画像素水域
function drawLakeTile(ctx, sx, sy, tx, ty) {
  ctx.fillStyle = ((tx + ty) & 1) ? COLORS.water : '#2a78c4';
  ctx.fillRect(sx, sy, TILE, TILE);
  ctx.fillStyle = COLORS.waterLight;
  const ph = (tx * 3 + ty * 7) % 4;
  ctx.fillRect(sx + 6, sy + 10 + ph * 2, 14, 2);
  ctx.fillRect(sx + 18, sy + 22 - ph * 2, 10, 2);
}

// 画像素基地（砖块）
function drawBaseTile(ctx, sx, sy, tx, ty, team, snow) {
  const isChina = team === 'china';
  const base = isChina ? COLORS.baseC : COLORS.baseU;
  const dark = isChina ? COLORS.baseCDark : COLORS.baseUDark;
  ctx.fillStyle = dark; ctx.fillRect(sx, sy, TILE, TILE);
  ctx.fillStyle = base;
  for (let yy = 0; yy < TILE; yy += 10) {
    for (let xx = 0; xx < TILE; xx += 20) {
      const off = ((yy / 10) % 2) * 10;
      ctx.fillRect(sx + xx + off + 1, sy + yy + 1, 18, 8);
    }
  }
  ctx.strokeStyle = dark; ctx.lineWidth = 1; ctx.strokeRect(sx + 0.5, sy + 0.5, TILE - 1, TILE - 1);
}

// 启动
const canvas = document.getElementById('game');
const __game = new Game(canvas);
if (typeof window !== 'undefined') window.__game = __game;
