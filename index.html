// 商店面板：解锁眼镜 / 宝石充电 / 升级发现器 / 升级武器（受信誉折扣）
class Shop {
  constructor(game) {
    this.game = game;
    this.el = document.createElement('div');
    this.el.id = 'shop';
    document.body.appendChild(this.el);
  }
  toggle() {
    const open = this.el.style.display !== 'flex';
    this.el.style.display = open ? 'flex' : 'none';
    if (open) this.render();
  }
  render() {
    const g = this.game, inv = g.inventory, eq = g.equipment, rep = g.reputation;
    const d = rep.discount();
    const glassesCost = Math.round(30 * d);
    const detInfo = eq.detectorLevel === 'C'
      ? '已是最高级'
      : `升级至 ${eq.detectorLevel === 'A' ? 'B' : 'C'}（${Math.round((eq.detectorLevel === 'A' ? 20 : 40) * d)}金）`;
    const w = g.player.weapons[g.player.curWeapon];
    const glassesState = eq.glassesUnlocked ? `已配发（电量${eq.glassesBattery}%）` : `解锁 ${glassesCost}金`;
    this.el.innerHTML = `
      <div class="panel">
        <h2>商店（信誉折扣 ×${d}）　持有：💎宝石${inv.gems}　金${inv.gold} 银${inv.silver} 铜${inv.copper}</h2>
        <div class="shoprow"><span>眼科技眼镜（鉴定假金）</span><button data-a="unlock">${glassesState}</button></div>
        <div class="shoprow"><span>宝石充电（眼镜电量充满）</span><button data-a="charge">用1宝石</button></div>
        <div class="shoprow"><span>宝石发现器精度</span><button data-a="updet">${detInfo}</button></div>
        <div class="shoprow"><span>升级武器[${g.player.curWeapon + 1}]${w.name}（伤害+6）</span><button data-a="upw">${Math.round(15 * d)}金</button></div>
        <div class="shoprow"><span>宝石补给：全武器弹药补满</span><button data-a="gemammo">用2宝石</button></div>
        <button data-a="close" class="primary">关闭 (B)</button>
      </div>`;
    this.el.querySelectorAll('button').forEach((b) => {
      b.onclick = () => { this.act(b.dataset.a); this.render(); };
    });
  }
  act(a) {
    const g = this.game, inv = g.inventory, eq = g.equipment, rep = g.reputation;
    const d = rep.discount();
    if (a === 'unlock') {
      if (eq.glassesUnlocked) g.toast('眼镜已配发');
      else g.toast(eq.unlockGlasses(inv).msg);
    } else if (a === 'charge') g.toast(eq.chargeGlasses(inv).msg);
    else if (a === 'updet') g.toast(eq.upgradeDetector(inv).msg);
    else if (a === 'upw') {
      const cost = Math.round(15 * d), w = g.player.weapons[g.player.curWeapon];
      if (inv.gold < cost) g.toast('金币不足');
      else { inv.gold -= cost; w.dmg += 6; w.noise *= 0.9; g.toast(`${w.name} 升级！伤害${w.dmg}`); }
    } else if (a === 'gemammo') {
      if (inv.gems < 2) g.toast('宝石不足（需2）');
      else {
        inv.gems -= 2;
        for (const w of g.player.weapons) if (w.ammoMax) w.ammo = w.ammoMax;
        g.toast('💎 全武器弹药已补满');
      }
    } else if (a === 'close') this.toggle();
  }
}

// ===== main.js =====



























class Game {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.input = new Input(canvas);
    this.camera = new Camera(this.vw, this.vh);
    this.rng = makeRNG();
    this.state = 'menu';
    this.paused = false;
    this.time = 0;
    this.messages = [];
    this.shop = new Shop(this);
    // 宝石捡取按钮（DOM）
    this.pickupEl = document.createElement('button');
    this.pickupEl.id = 'pickupBtn';
    this.pickupEl.style.display = 'none';
    this.pickupEl.textContent = '💎 挖出宝石（收入账号）';
    this.pickupEl.onclick = () => this.onPickupClick();
    document.body.appendChild(this.pickupEl);
    showStart(this);
    startLoop((dt) => this.update(dt), () => this.render());
  }

  resize() {
    this.vw = this.canvas.width = window.innerWidth;
    this.vh = this.canvas.height = window.innerHeight;
    if (this.camera) { this.camera.vw = this.vw; this.camera.vh = this.vh; }
  }

  foe() { return this.team === 'china' ? 'usa' : 'china'; }
  teamCfg(t) { return TEAMS[t]; }
  allUnits() { return [this.player, ...this.allies, ...this.enemies].filter((u) => u.alive); }
  combatCtx() {
    return { units: this.allUnits(), world: this.world, projectiles: this.projectiles, smokes: this.smokes, combat: this.combat, game: this };
  }

  start(team, goal) {
    this.team = team; this.goal = goal;
    this.world = createWorld(this.rng.int(1, 1e9));
    this.season = new SeasonManager((s) => this.onSeasonChange(s));
    this.equipment = new Equipment();
    this.equipment.glassesUnlocked = true; this.equipment.glassesBattery = 100; // 开局免费配发眼镜，按R即可鉴定
    this.inventory = new Inventory();
    this.reputation = new Reputation();
    this.tasks = new TaskManager();
    this.combat = new Combat(this);
    this.projectiles = []; this.smokes = []; this.traps = []; this.items = []; this.treeFalls = [];
    this.allies = []; // 我方AI队友
    this.bases = { china: { hp: 500, max: 500 }, usa: { hp: 500, max: 500 } };
    this.stats = { kills: 0, raid: 0, gems: 0, fake: 0 };
    this.time = 0;

    const b = BASE[team];
    this.player = new Unit(team, (b.tx + b.tw / 2) * TILE, (b.ty + b.th / 2) * TILE, true);
    this.player.curWeapon = 1; // 开局默认持远程武器
    this.player.maxHp = 160; this.player.hp = 160; // 玩家血量加厚
    // 初始弹药补满
    this.player.weapons.forEach((w) => { if (w.ammoMax) w.ammo = w.ammoMax; });
    // 初始资源，让新手有升级空间
    this.inventory.addResource('gold', 30);
    this.inventory.addResource('silver', 20);
    this.enemies = this.spawnEnemies();
    this.allies = this.spawnAllies();
    this.items = populateItems(this.world, this.rng);

    this.tasks.addTask(TASK_TEMPLATES[0]);
    this.tasks.addTask(TASK_TEMPLATES[2]);
    this.state = 'playing';
    this.paused = false;
    this.pickupEl.style.display = 'none';
    this.camera.follow(this.player.x, this.player.y);
    this.toast(`你执掌${TEAMS[team].name}，目标：${goal === 'destroy' ? '摧毁敌基地' : '累计资源200'}`);
  }

  spawnEnemies() {
    const foe = this.foe();
    const b = BASE[foe];
    const heroes = foe === 'usa' ? USA_HEROES : CHINA_HEROES;
    const arr = [];
    for (let i = 0; i < 5; i++) { // 原来是8个敌人，减到5降低压迫感
      const ex = (b.tx + this.rng.range(0, b.tw)) * TILE;
      const ey = (b.ty + this.rng.range(0, b.th)) * TILE;
      const e = new Unit(foe, ex, ey);
      e.maxHp = ENEMY_HP; e.hp = ENEMY_HP; // 保证我方3次命中击杀（敌方固定80，不叠加英雄血量）
      e.weapons.forEach((w) => (w.ammo = 9999));
      e.ai.homeX = ex; e.ai.homeY = ey;
      if (foe === 'usa' && i < 2) e.ai.raider = true; // 袭击者从3减到2
      if (foe === 'china') e.traps = 2;
      const p = heroes[i % heroes.length];
      e.profile = p; e.name = p.name; e.color = p.primary;
      e.spdMul = p.spdMul || 1; e.dmgMul = p.dmgMul || 1; e.curWeapon = p.curWeapon || 0;
      arr.push(e);
    }
    return arr;
  }

  // 我方AI队友：开局在基地附近生成5名中国历史战斗英雄，跟随玩家并主动迎敌
  spawnAllies() {
    const team = this.team;
    const b = BASE[team];
    const heroes = team === 'china' ? CHINA_HEROES : USA_HEROES;
    const arr = [];
    for (let i = 0; i < heroes.length; i++) {
      const ax = (b.tx + this.rng.range(1, b.tw - 1)) * TILE;
      const ay = (b.ty + this.rng.range(1, b.th - 1)) * TILE;
      const a = new Unit(team, ax, ay);
      a.isPlayer = false;
      const p = heroes[i];
      a.profile = p; a.name = p.name; a.color = p.primary;
      a.maxHp = ALLY_HP + (p.hpBonus || 0); a.hp = a.maxHp;
      a.spdMul = p.spdMul || 1; a.dmgMul = 1; // 我方伤害固定1，保持"3次击杀"平衡
      a.curWeapon = p.curWeapon || 0;
      a.weapons.forEach((w) => { if (w.ammoMax) w.ammo = w.ammoMax; });
      a.ai.homeX = ax; a.ai.homeY = ay; a.ai.timer = 0; a.ai.state = 'follow';
      arr.push(a);
    }
    return arr;
  }

  // ===== 主循环 =====
  update(dt) {
    if (this.state !== 'playing') return;
    if (this.input.pressed('escape') || this.input.pressed('p')) this.togglePause();
    if (this.paused) { this.input.endFrame(); return; }

    this.time += dt;
    this.season.update(dt);
    this.equipment.update(dt);
    updatePlayer(this, dt);
    for (const e of this.enemies) updateEnemy(this, e, dt);
    for (const a of this.allies) updateAlly(this, a, dt);
    updateProjectiles(this.combatCtx(), dt);
    this.updateTraps();
    this.updateSmokes(dt);
    this.updateTreeFalls(dt);
    this.revealBuried();
    this.pickupItems();

    // 计时器衰减
    if (this.player.muzzle > 0) this.player.muzzle -= dt;
    if (this.player.weaponSwitchT > 0) this.player.weaponSwitchT -= dt;
    for (const e of this.enemies) {
      if (e.muzzle > 0) e.muzzle -= dt;
      if (e.weaponSwitchT > 0) e.weaponSwitchT -= dt;
    }
    for (const a of this.allies) {
      if (a.muzzle > 0) a.muzzle -= dt;
      if (a.weaponSwitchT > 0) a.weaponSwitchT -= dt;
    }

    const eb = BASE[this.foe()];
    if (this.player.alive && this.inRect(this.player.x, this.player.y, eb)) {
      this.combat.damageBase(this.foe(), 45 * dt); // 原30，加快以匹配更高的基地HP
    }
    if (this.goal === 'collect' && this.inventory.total() >= 200) return this.win();
    if (!this.player.alive) return this.lose();

    const msgs = this.tasks.update(this.inventory, this.reputation);
    msgs.forEach((m) => this.toast(m));

    for (const m of this.messages) m.t -= dt * 0.5;
    this.messages = this.messages.filter((m) => m.t > 0);

    this.updatePickupButton();
    this.camera.follow(this.player.x, this.player.y);
    this.input.endFrame();
  }

  // ===== 系统回调 =====
  toast(msg) {
    this.messages.push({ text: msg, t: 4 });
    if (this.messages.length > 8) this.messages.shift();
  }

  // 树木被击倒时的视觉特效（碎片飞溅 + 木屑）
  addTreeFallFX(x, y) {
    const fx = { x, y, life: 0.8, particles: [] };
    for (let i = 0; i < 12; i++) {
      const ang = (Math.PI * 2 * i / 12) + Math.random() * 0.5;
      const spd = 40 + Math.random() * 80;
      fx.particles.push({
        ox: 0, oy: 0,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd - 30,
        size: 2 + Math.random() * 3,
        color: Math.random() > 0.5 ? '#5a3d1a' : '#8b6914',
      });
    }
    this.treeFalls.push(fx);
  }
  placeTrap(unit) {
    if (unit.traps > 0) {
      this.traps.push(makeTrap(unit.team, unit.x, unit.y));
      unit.traps--;
      this.toast('已布置陷阱');
    } else this.toast('没有可用陷阱');
  }
  toggleDetector() {
    this.equipment.toggleDetector();
    this.toast(`宝石发现器${this.equipment.detectorActive ? '开启（有暴露风险）' : '关闭'}`);
  }
  identify() {
    const r = this.inventory.identifyAll(this.equipment, this.reputation);
    this.toast(r.msg);
  }
  reportFake() {
    if (this.inventory.fakeGold > 0) {
      this.inventory.fakeGold--; this.reputation.gain(5);
      this.toast('上报假金：信誉+5，老板好感提升');
    } else this.toast('没有已确认的假金');
  }
  toggleShop() { this.shop.toggle(); }
  togglePause() {
    if (!this.paused) { this.paused = true; showPause(this); }
    else { this.paused = false; hideOverlay(); }
  }
  alertNearby(unit, noise) {
    const range = 150 + noise * 300;
    for (const e of this.enemies) {
      if (dist(e.x, e.y, unit.x, unit.y) < range) { e.ai.state = 'chase'; e.ai.target = this.player; }
    }
  }
  onUnitKilled(u) {
    if (u === this.player) return this.lose();
    if (u.isPlayer) return this.lose();
    if (u.team === this.foe()) {
      this.stats.kills++;
      this.tasks.event('kill', 1);
    } else if (u.team === this.team) {
      this.toast(`💥 ${u.name || '队友'} 阵亡！`);
    }
  }
  onBaseDestroyed(team) {
    if (team === this.foe()) return this.win();
    if (team === this.team) return this.lose();
  }
  onSeasonChange(season) {
    spawnSeasonTreasure(season, this.world, this.rng, this.items);
    const name = { spring: '春', summer: '夏', autumn: '秋', winter: '冬' }[season];
    this.toast(`进入${name}季 · 出现季节宝物（夏：无限水源宝石 / 冬：雪地摩托）`);
  }

  // ===== 物品与陷阱 =====
  revealBuried() {
    if (!this.equipment.detectorActive) return;
    const r = this.equipment.detectorRadius();
    for (const it of this.items) {
      if (it.buried && !it.taken && !it.revealed && dist(this.player.x, this.player.y, it.x, it.y) <= r) it.revealed = true;
    }
  }
  // 普通（非埋藏）物品自动拾取；埋藏宝石由按钮拾取
  pickupItems() {
    for (const it of this.items) {
      if (it.taken || it.buried) continue;
      if (dist(this.player.x, this.player.y, it.x, it.y) <= this.player.radius + 12) {
        it.taken = true;
        this.collect(it);
      }
    }
    this.items = this.items.filter((i) => !i.taken);
  }
  collect(it) {
    const inv = this.inventory;
    switch (it.type) {
      case 'gold': inv.pickSuspect(false); this.tasks.event('collect', 1); this.toast('拾得可疑金（按R鉴定）'); break;
      case 'fakeGold': inv.pickSuspect(true); this.tasks.event('collect', 1); this.toast('拾得可疑金（按R鉴定）'); break;
      case 'silver': case 'copper': inv.addResource(it.type, 1); this.tasks.event('collect', 1); this.toast(`拾得${it.type}`); break;
      case 'gem': inv.addResource('gem', 1); this.stats.gems++; this.tasks.event('gem', 1); this.toast('💎 宝石已收入账号'); break;
      case 'waterGem': this.player.hasWaterGem = true; this.toast('获得【无限水源宝石】夏季不再缺水'); break;
      case 'snowmobile': this.player.hasSnowmobile = true; this.toast('获得【雪地摩托】冬季移速大增'); break;
    }
  }
  // 最近的、已发现且可挖的埋藏宝石
  nearbyGem() {
    let best = null, bd = 1e9;
    for (const it of this.items) {
      if (it.taken || it.type !== 'gem' || !it.buried || !it.revealed) continue;
      const d = dist(this.player.x, this.player.y, it.x, it.y);
      if (d <= this.player.radius + 40 && d < bd) { bd = d; best = it; }
    }
    return best;
  }
  // 探测范围内（无论是否开启发现器）最近的埋藏宝石，用于提示
  nearestBuriedGem(r) {
    let best = null, bd = 1e9;
    for (const it of this.items) {
      if (it.taken || it.type !== 'gem' || !it.buried) continue;
      const d = dist(this.player.x, this.player.y, it.x, it.y);
      if (d <= r && d < bd) { bd = d; best = it; }
    }
    return best;
  }
  updatePickupButton() {
    const g = this.nearbyGem();
    this.pickupEl.style.display = g ? 'block' : 'none';
  }
  onPickupClick() {
    const g = this.nearbyGem();
    if (g) {
      g.taken = true;
      this.collect(g);
      this.pickupEl.style.display = 'none';
    }
  }
  updateTraps() {
    for (const tr of this.traps) {
      if (!tr.armed) continue;
      const list = tr.team === this.player.team ? this.enemies : [this.player];
      for (const u of list) {
        if (u.alive && dist(u.x, u.y, tr.x, tr.y) <= tr.radius + u.radius) {
          this.combat.damage(u, tr.dmg);
          tr.armed = false;
          this.toast('陷阱触发！');
          break;
        }
      }
    }
    this.traps = this.traps.filter((t) => t.armed);
  }
  updateSmokes(dt) {
    for (const s of this.smokes) s.life -= dt;
    this.smokes = this.smokes.filter((s) => s.life > 0);
  }
  updateTreeFalls(dt) {
    for (const fx of this.treeFalls) {
      fx.life -= dt;
      for (const p of fx.particles) {
        p.ox += p.vx * dt; p.oy += p.vy * dt;
        p.vy += 120 * dt; // 重力
      }
    }
    this.treeFalls = this.treeFalls.filter((f) => f.life > 0);
  }
  inRect(x, y, b) {
    const px = b.tx * TILE, py = b.ty * TILE, w = b.tw * TILE, h = b.th * TILE;
    return x >= px && x <= px + w && y >= py && y <= py + h;
  }
  win() { this.state = 'over'; this.pickupEl.style.display = 'none'; showGameOver(this, true); }
  lose() { this.state = 'over'; this.pickupEl.style.display = 'none'; showGameOver(this, false); }

  // ===== 渲染 =====
  render() {
    const ctx = this.ctx;
    // 高清直绘：背景天空渐变（森林上方透出的天光）
    const sky = ctx.createLinearGradient(0, 0, 0, this.vh);
    sky.addColorStop(0, '#cfeafe');
    sky.addColorStop(1, '#a9d4b0');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, this.vw, this.vh);
    if (this.state === 'menu') return;

    // 高清直绘：世界直接画到主画布（不缩放、保留全部细节）
    this.drawWorld(ctx);

    // 背景与画面特效：远景天际带 + 大气光 + 暗角 + 漂浮微粒
    this.drawSceneFX(ctx, this.camera);

    drawHUD(ctx, this);
  }

  // 逼真背景：顶部远景天际带（视差山脉/流云/太阳辉光）+ 大气光 + 暗角 + 漂浮微粒
  drawSceneFX(ctx, cam) {
    const vw = this.vw, vh = this.vh, t = this.time;
    // ---- 顶部远景天际带（始终可见，营造纵深）----
    const H = Math.min(96, vh * 0.16);
    const sky2 = ctx.createLinearGradient(0, 0, 0, H);
    sky2.addColorStop(0, '#bfe3ff');
    sky2.addColorStop(0.7, '#dcefff');
    sky2.addColorStop(1, 'rgba(220,239,255,0)');
    ctx.fillStyle = sky2;
    ctx.fillRect(0, 0, vw, H);
    // 太阳辉光（右上）
    const sg = ctx.createRadialGradient(vw * 0.82, H * 0.5, 4, vw * 0.82, H * 0.5, 60);
    sg.addColorStop(0, 'rgba(255,250,210,0.9)'); sg.addColorStop(1, 'rgba(255,250,210,0)');
    ctx.fillStyle = sg; ctx.fillRect(vw * 0.6, 0, vw * 0.4, H);
    // 远山（两层视差）
    const drawHills = (par, col, baseY, amp) => {
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.moveTo(0, H);
      for (let x = 0; x <= vw; x += 16) {
        const wx = x + cam.x * par;
        const y = baseY + Math.sin(wx * 0.004) * amp + Math.sin(wx * 0.011) * amp * 0.5;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(vw, H); ctx.closePath(); ctx.fill();
    };
    drawHills(0.15, 'rgba(150,180,210,0.55)', H * 0.62, 14);
    drawHills(0.30, 'rgba(110,150,190,0.7)', H * 0.78, 10);
    // 流云（视差漂移）
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    for (let i = 0; i < 4; i++) {
      const cx = (i * 260 + (t * 12) + cam.x * 0.1) % (vw + 160) - 80;
      const cy = H * (0.28 + 0.12 * (i % 2));
      ctx.beginPath(); ctx.ellipse(cx, cy, 34, 12, 0, 0, Math.PI * 2);
      ctx.ellipse(cx + 26, cy + 4, 24, 9, 0, 0, Math.PI * 2);
      ctx.ellipse(cx - 24, cy + 4, 20, 8, 0, 0, Math.PI * 2); ctx.fill();
    }

    // ---- 全屏大气光（右上阳光方向）----
    const lg = ctx.createRadialGradient(vw * 0.8, vh * 0.2, vh * 0.2, vw * 0.8, vh * 0.2, vh * 1.1);
    lg.addColorStop(0, 'rgba(255,248,220,0.10)');
    lg.addColorStop(0.5, 'rgba(255,248,220,0)');
    lg.addColorStop(1, 'rgba(20,30,40,0.10)');
    ctx.fillStyle = lg; ctx.fillRect(0, 0, vw, vh);

    // ---- 边缘暗角 ----
    const vg = ctx.createRadialGradient(vw / 2, vh / 2, vh * 0.35, vw / 2, vh / 2, vh * 0.75);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.22)');
    ctx.fillStyle = vg; ctx.fillRect(0, 0, vw, vh);

    // ---- 漂浮微粒（花粉/尘埃，缓慢上升）----
    ctx.fillStyle = 'rgba(255,255,240,0.35)';
    for (let i = 0; i < 26; i++) {
      const px = (i * 137.5 + cam.x * 0.5) % vw;
      const py = (vh - ((i * 53 + t * 14) % (vh + 20)));
      const s = (i % 3) * 0.6 + 0.6;
      ctx.beginPath(); ctx.arc(px, py, s, 0, Math.PI * 2); ctx.fill();
    }
  }

  drawWorld(ctx) {
    const cam = this.camera;
    const env = this.season.env();
    const snow = env.snow;
    const x0 = Math.max(0, Math.floor(cam.x / TILE));
    const y0 = Math.max(0, Math.floor(cam.y / TILE));
    const x1 = Math.min(MAP_W, Math.ceil((cam.x + this.vw) / TILE));
    const y1 = Math.min(MAP_H, Math.ceil((cam.y + this.vh) / TILE));

    // ---- 第一层：高清自然草地（渐变底色 + 柔和明暗 + 草叶纹理）----
    const baseTop = snow ? '#eef4fa' : '#74b24d';
    const baseBot = snow ? '#d2e0ed' : '#4c8a37';
    const grd = ctx.createLinearGradient(0, 0, 0, this.vh);
    grd.addColorStop(0, baseTop);
    grd.addColorStop(1, baseBot);
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, this.vw, this.vh);

    for (let ty = y0; ty < y1; ty++) {
      for (let tx = x0; tx < x1; tx++) {
        const c = this.world.grid[ty][tx];
        if (c === T.TREE || c === T.BASE_C || c === T.BASE_U || c === T.WATER) continue;
        const sx = tx * TILE - cam.x, sy = ty * TILE - cam.y;
        const n = tileNoise(tx, ty);
        // 柔和明暗斑块，消除棋盘格硬边
        if (n > 0.5) ctx.fillStyle = snow ? `rgba(255,255,255,${(n - 0.5) * 0.5})` : `rgba(255,255,255,${(n - 0.5) * 0.10})`;
        else ctx.fillStyle = snow ? `rgba(150,170,190,${(0.5 - n) * 0.25})` : `rgba(0,40,0,${(0.5 - n) * 0.18})`;
        ctx.fillRect(sx, sy, TILE, TILE);
        // 草叶纹理（雪天不画）
        if (!snow && c === T.GROUND) {
          ctx.strokeStyle = 'rgba(46,96,32,0.22)';
          ctx.lineWidth = 1;
          const blades = 2 + Math.floor(n * 3);
          for (let bI = 0; bI < blades; bI++) {
            const bx = sx + ((n * 97 + bI * 13) % TILE);
            const by = sy + 8 + ((bI * 7 + tx) % (TILE - 12));
            ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx - 1, by - 4); ctx.stroke();
          }
        }
        // 岩石 / 河床
        if (c === T.ROCK) drawRock(ctx, sx, sy, snow);
        else if (c === T.RIVERBED) {
          const rg = ctx.createLinearGradient(sx, sy, sx, sy + TILE);
          rg.addColorStop(0, '#9c8243'); rg.addColorStop(1, '#6f5a2e');
          ctx.fillStyle = rg; ctx.fillRect(sx, sy, TILE, TILE);
          ctx.fillStyle = 'rgba(120,100,60,0.5)';
          for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.arc(sx + 8 + i * 10, sy + 12 + (i % 2) * 12, 3, 0, Math.PI * 2); ctx.fill(); }
        }
      }
    }

    // ---- 水域：带渐变的湖泊 ----
    for (let ty = y0; ty < y1; ty++) {
      for (let tx = x0; tx < x1; tx++) {
        if (this.world.grid[ty][tx] !== T.WATER) continue;
        const sx = tx * TILE - cam.x, sy = ty * TILE - cam.y;
        drawLakeTile(ctx, sx, sy, tx, ty, this.time);
      }
    }

    // ---- 基地区域：国籍主题石板广场 ----
    for (let ty = y0; ty < y1; ty++) {
      for (let tx = x0; tx < x1; tx++) {
        const c = this.world.grid[ty][tx];
        const isChina = c === T.BASE_C, isUSA = c === T.BASE_U;
        if (!isChina && !isUSA) continue;
        const sx = tx * TILE - cam.x, sy = ty * TILE - cam.y;
        drawBaseFloor(ctx, sx, sy, tx, ty, isChina ? 'china' : 'usa');
      }
    }
    // 基地上方叠加国籍主题装饰（旗帜/徽记/门楼）
    drawBaseDecor(ctx, BASE.china, 'china', cam);
    drawBaseDecor(ctx, BASE.usa, 'usa', cam);

    // ---- 树木：真正的树形（阴影+树干+多层树冠）----
    for (let ty = y0; ty < y1; ty++) {
      for (let tx = x0; tx < x1; tx++) {
        if (this.world.grid[ty][tx] !== T.TREE) continue;
        const sx = tx * TILE - cam.x, sy = ty * TILE - cam.y;
        drawTree(ctx, sx, sy, tx, ty, snow);
      }
    }

    // ---- 地道标记 ----
    for (let ty = y0; ty < y1; ty++) {
      for (let tx = x0; tx < x1; tx++) {
        if (!this.world.isTunnelAt(tx * TILE + 2, ty * TILE + 2)) continue;
        const sx = tx * TILE - cam.x, sy = ty * TILE - cam.y;
        Render.strokeRect(ctx, sx + 3, sy + 3, TILE - 6, TILE - 6, 'rgba(120,160,255,0.35)', 1);
      }
    }

    // ---- 进入敌方阵地效果（红边框+警告）----
    this.drawEnemyTerritoryEffect(ctx);

    // ---- 物品、特效、单位（保持原有逻辑）----
    // 物品：高清图标（圆角菱形 + 辉光）
    for (const it of this.items) {
      if (it.buried) continue;
      const [isx, isy] = cam.toScreen(it.x, it.y);
      const col = itemColor(it.type);
      // 外辉光
      ctx.fillStyle = col.replace(')', ',0.3)').replace('rgb', 'rgba');
      if (col.startsWith('#')) {
        // hex to rgba for glow
        const r2 = parseInt(col.slice(1, 3), 16), g2 = parseInt(col.slice(3, 5), 16), b2 = parseInt(col.slice(5, 7), 16);
        ctx.fillStyle = `rgba(${r2},${g2},${b2},0.35)`;
      }
      ctx.beginPath(); ctx.arc(isx, isy, 9, 0, Math.PI * 2); ctx.fill();
      // 主体菱形
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.moveTo(isx, isy - 7);
      ctx.lineTo(isx + 6, isy);
      ctx.lineTo(isx, isy + 7);
      ctx.lineTo(isx - 6, isy);
      ctx.closePath();
      ctx.fill();
      // 高光
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.moveTo(isx, isy - 7);
      ctx.lineTo(isx + 3, isy - 2);
      ctx.lineTo(isx, isy);
      ctx.lineTo(isx - 3, isy - 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(isx, isy - 7); ctx.lineTo(isx + 6, isy); ctx.lineTo(isx, isy + 7); ctx.lineTo(isx - 6, isy);
      ctx.closePath();
      ctx.stroke();
    }
    // 宝石发现器扫描特效 + 已发现宝石标记
    this.drawGemFX(ctx, cam);
    // 烟雾
    for (const s of this.smokes) {
      const [ssx, ssy] = cam.toScreen(s.x, s.y);
      ctx.fillStyle = `rgba(200,200,200,${Math.min(0.6, s.life / 6)})`;
      ctx.beginPath(); ctx.arc(ssx, ssy, s.r, 0, Math.PI * 2); ctx.fill();
    }
    // 树木倒下特效（三角碎片飞溅）
    for (const tf of this.treeFalls) {
      const [tfx, tfy] = cam.toScreen(tf.x, tf.y);
      const alpha = Math.min(1, tf.life / 0.8);
      for (let i = 0; i < tf.particles.length; i++) {
        const p = tf.particles[i];
        const px = tfx + p.ox, py = tfy + p.oy;
        const s = p.size;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = alpha;
        // 随机三角形碎片 + 木屑小圆点
        if (i % 3 === 0) {
          ctx.beginPath();
          ctx.moveTo(px, py - s); ctx.lineTo(px + s * 0.7, py + s * 0.5); ctx.lineTo(px - s * 0.7, py + s * 0.5);
          ctx.closePath(); ctx.fill();
        } else if (i % 3 === 1) {
          ctx.beginPath();
          ctx.moveTo(px - s * 0.6, py - s * 0.6); ctx.lineTo(px + s * 0.8, py - s * 0.2); ctx.lineTo(px + s * 0.2, py + s * 0.8); ctx.lineTo(px - s * 0.7, py + s * 0.3);
          ctx.closePath(); ctx.fill();
        } else {
          ctx.beginPath(); ctx.arc(px, py, s * 0.45, 0, Math.PI * 2); ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
    }
    // 陷阱
    for (const tr of this.traps) {
      if (tr.team !== this.player.team) continue;
      const [tsx, tsy] = cam.toScreen(tr.x, tr.y);
      Render.circle(ctx, tsx, tsy, 5, '#d4a');
      Render.strokeCircle(ctx, tsx, tsy, 8, 'rgba(212,68,170,0.4)', 1);
    }
    // 抛射物
    for (const p of this.projectiles) drawProjectile(ctx, cam, p);
    // 单位：玩家 + 队友 + 敌人，全部人形像素造型
    for (const u of [this.player, ...this.allies, ...this.enemies]) {
      if (!u.alive) continue;
      const [usx, usy] = cam.toScreen(u.x, u.y);
      drawHumanoid(ctx, usx, usy, u, this.time, this.team);
    }
  }

  // 敌方阵地视觉效果：红色警告边框 + 屏幕泛红 + 文字提示
  drawEnemyTerritoryEffect(ctx) {
    const eb = BASE[this.foe()];
    if (!this.player.alive || !this.inRect(this.player.x, this.player.y, eb)) return;
    const vw = this.vw, vh = this.vh;
    const pulse = 0.5 + 0.5 * Math.sin(this.time * 4);
    // 四周边框红闪
    const bw = 6 + pulse * 8;
    ctx.fillStyle = `rgba(220,40,40,${0.35 + pulse * 0.25})`;
    ctx.fillRect(0, 0, vw, bw);       // 上
    ctx.fillRect(0, vh - bw, vw, bw);  // 下
    ctx.fillRect(0, 0, bw, vh);       // 左
    ctx.fillRect(vw - bw, 0, bw, vh);  // 右
    // 角落斜线装饰
    ctx.strokeStyle = `rgba(255,100,80,${0.3 + pulse * 0.3})`;
    ctx.lineWidth = 3;
    const cl = 50;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(cl, 0); ctx.lineTo(0, cl); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(vw, 0); ctx.lineTo(vw - cl, 0); ctx.lineTo(vw, cl); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, vh); ctx.lineTo(cl, vh); ctx.lineTo(0, vh - cl); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(vw, vh); ctx.lineTo(vw - cl, vh); ctx.lineTo(vw, vh - cl); ctx.stroke();
    // 警告文字
    ctx.fillStyle = `rgba(255,60,60,${0.7 + pulse * 0.3})`;
    ctx.font = `bold ${18 + pulse * 4}px "PingFang SC", sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('⚠ 已进入敌方阵地！', vw / 2, 58);
    ctx.font = '13px "PingFang SC", sans-serif';
    ctx.fillStyle = `rgba(255,150,130,${0.6 + pulse * 0.3})`;
    ctx.fillText('正在破坏敌方基地… 持续造成伤害', vw / 2, 80);
  }

  // 宝石发现器扫描波纹 + 已发现宝石的明显标记
  drawGemFX(ctx, cam) {
    const detOn = this.equipment.detectorActive;
    if (detOn) {
      const [psx, psy] = cam.toScreen(this.player.x, this.player.y);
      const R = this.equipment.detectorRadius();
      // 探测半径圈
      Render.strokeCircle(ctx, psx, psy, R, 'rgba(120,220,255,0.25)', 1);
      // 扩散扫描波纹
      for (let k = 0; k < 3; k++) {
        const phase = (this.time * 0.8 + k / 3) % 1;
        Render.strokeCircle(ctx, psx, psy, R * phase, `rgba(120,220,255,${0.5 * (1 - phase)})`, 2);
      }
    }
    // 已发现的埋藏宝石：发光菱形 + 光柱 + 标签
    for (const it of this.items) {
      if (!(it.type === 'gem' && it.buried && it.revealed)) continue;
      const [sx, sy] = cam.toScreen(it.x, it.y);
      const pulse = 0.5 + 0.5 * Math.sin(this.time * 5);
      Render.line(ctx, sx, sy - 46, sx, sy + 6, `rgba(120,255,220,${0.22 + 0.2 * pulse})`, 6);
      Render.circle(ctx, sx, sy, 14 + pulse * 4, `rgba(120,255,220,${0.35 + 0.3 * pulse})`);
      drawDiamond(ctx, sx, sy, 9, '#39ffd0');
      Render.text(ctx, '💎 宝石', sx, sy - 26, '#bfffe9', 13, 'center');
    }
  }
}

// 基于格子坐标的确定性伪随机（0..1），用于地面明暗、树叶扰动等
function tileNoise(tx, ty) {
  let h = (Math.imul(tx, 374761393) + Math.imul(ty, 668265263)) ^ 0x5bf03635;
  h = Math.imul(h ^ (h >>> 13), 1274126177);
  return ((h ^ (h >>> 16)) >>> 0) / 4294967295;
}

function itemColor(type) {
  return {
    gold: COLORS.gold, silver: COLORS.silver, copper: COLORS.copper, gem: COLORS.gem,
    fakeGold: COLORS.fake, waterGem: '#39d0ff', snowmobile: '#ecf0f1',
  }[type] || '#fff';
}

function drawDiamond(ctx, x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y - r);
  ctx.lineTo(x + r * 0.8, y);
  ctx.lineTo(x, y + r);
  ctx.lineTo(x - r * 0.8, y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// 高清武器绘制（随朝向旋转，渐变金属质感）
// 颜色明暗调整（f>0 变亮，f<0 变暗）
function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  r = Math.max(0, Math.min(255, Math.round(r * (1 + f))));
  g = Math.max(0, Math.min(255, Math.round(g * (1 + f))));
  b = Math.max(0, Math.min(255, Math.round(b * (1 + f))));
  return `rgb(${r},${g},${b})`;
}

// 五角星
function drawStar(ctx, cx, cy, r, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const rad = i % 2 === 0 ? r : r * 0.45;
    const a = -Math.PI / 2 + (i * Math.PI) / points;
    const x = cx + Math.cos(a) * rad, y = cy + Math.sin(a) * rad;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

// 单位手持武器（按英雄 weaponStyle 或武器 kind 绘制）
function drawPixelWeapon(ctx, hx, hy, u, teamCol) {
  const w = u.weapons[u.curWeapon];
  const style = (u.profile && u.profile.weaponStyle) || w.kind;
  ctx.save();
  ctx.translate(Math.round(hx), Math.round(hy));
  ctx.rotate(u.facing);
  switch (style) {
    case 'glaive': { // 青龙偃月刀
      ctx.fillStyle = '#6b4a2a'; ctx.fillRect(0, -1.5, 20, 3);
      ctx.fillStyle = '#2f9a47';
      ctx.beginPath(); ctx.moveTo(20, -2); ctx.quadraticCurveTo(31, -11, 26, 3); ctx.quadraticCurveTo(22, -2, 20, 2); ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(200,255,210,0.55)';
      ctx.beginPath(); ctx.moveTo(21, -3); ctx.quadraticCurveTo(29, -9, 25, 0); ctx.lineTo(20, 0); ctx.closePath(); ctx.fill();
      break;
    }
    case 'spear': { // 长枪
      ctx.fillStyle = '#6b4a2a'; ctx.fillRect(0, -1.5, 19, 3);
      const sg = ctx.createLinearGradient(19, -3, 19, 3);
      sg.addColorStop(0, '#e8eef5'); sg.addColorStop(1, '#9aa5b5');
      ctx.fillStyle = sg;
      ctx.beginPath(); ctx.moveTo(19, -3); ctx.lineTo(29, 0); ctx.lineTo(19, 3); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(19, -2); ctx.lineTo(28, 0); ctx.stroke();
      break;
    }
    case 'bow': { // 弓
      ctx.strokeStyle = '#6b4a2a'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(5, 0, 9, -Math.PI * 0.6, Math.PI * 0.6); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(5 + Math.cos(-Math.PI * 0.6) * 9, Math.sin(-Math.PI * 0.6) * 9);
      ctx.lineTo(5 + Math.cos(Math.PI * 0.6) * 9, Math.sin(Math.PI * 0.6) * 9); ctx.stroke();
      break;
    }
    case 'shield': { // 星盾（美队）
      ctx.fillStyle = '#2a4d8f'; ctx.beginPath(); ctx.arc(-2, 0, 7, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#e8c84a'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#fff'; drawStar(ctx, -2, 0, 4, 5);
      ctx.fillStyle = '#3a4450'; ctx.fillRect(4, -2, 9, 4);
      ctx.fillStyle = '#5a6470'; ctx.fillRect(5, -2, 5, 1.5);
      break;
    }
    case 'repulsor': { // 掌心炮（钢铁侠）
      const rg = ctx.createRadialGradient(6, 0, 1, 6, 0, 9);
      rg.addColorStop(0, '#eafdff'); rg.addColorStop(0.4, '#5ad1e6'); rg.addColorStop(1, 'rgba(90,209,230,0)');
      ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(6, 0, 9, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#c0392b'; ctx.fillRect(0, -2, 5, 4);
      break;
    }
    case 'hammer': { // 雷神之锤
      ctx.fillStyle = '#6b4a2a'; ctx.fillRect(0, -1.5, 14, 3);
      const hg = ctx.createLinearGradient(13, -6, 13, 6);
      hg.addColorStop(0, '#e8eef5'); hg.addColorStop(1, '#8a93a0');
      ctx.fillStyle = hg; roundRect(ctx, 13, -6, 7, 12, 2);
      ctx.fillStyle = 'rgba(90,209,230,0.55)'; ctx.fillRect(14, -5, 5, 10);
      break;
    }
    case 'fist': { // 双拳（浩克）
      ctx.fillStyle = '#3a7a2f'; ctx.beginPath(); ctx.arc(5, 0, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#2e6b27'; ctx.beginPath(); ctx.arc(5, 0, 2, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'dualpistol': { // 双枪（黑寡妇）
      ctx.fillStyle = '#2b3038'; ctx.fillRect(0, -3, 8, 3); ctx.fillRect(0, 1, 8, 3);
      ctx.fillStyle = '#5a6470'; ctx.fillRect(2, -3, 5, 1.5); ctx.fillRect(2, 2.5, 5, 1.5);
      break;
    }
    default: { // 通用：按武器 kind
      if (w.kind === 'melee') {
        const bg = ctx.createLinearGradient(0, -2, 0, 2);
        bg.addColorStop(0, '#e8eef5'); bg.addColorStop(0.5, '#9aa5b5'); bg.addColorStop(1, '#555f6a');
        ctx.fillStyle = bg;
        ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(17, -1); ctx.lineTo(17, 1); ctx.lineTo(0, 2); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(16, -1); ctx.stroke();
      } else if (w.kind === 'ranged') {
        const bg = ctx.createLinearGradient(0, -2, 0, 2);
        bg.addColorStop(0, '#5a6470'); bg.addColorStop(0.5, '#3a4450'); bg.addColorStop(1, '#1f252e');
        ctx.fillStyle = bg; ctx.fillRect(0, -3, 19, 6);
        ctx.fillStyle = '#7a8492';
        ctx.beginPath(); ctx.moveTo(12, -5); ctx.lineTo(14, -5); ctx.lineTo(14, 5); ctx.lineTo(12, 5); ctx.closePath(); ctx.fill();
        ctx.fillStyle = teamCol; ctx.beginPath(); ctx.ellipse(-2, 0, 2.5, 3.5, 0, 0, Math.PI * 2); ctx.fill();
      } else if (w.kind === 'thrown') {
        const rg = ctx.createRadialGradient(11, -2, 1, 11, -2, 5);
        rg.addColorStop(0, '#f8c04a'); rg.addColorStop(0.7, '#d4782a'); rg.addColorStop(1, '#5a2d10');
        ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(11, -2, 5, 0, Math.PI * 2); ctx.fill();
      } else if (w.kind === 'trap') {
        ctx.fillStyle = '#7a5580'; ctx.beginPath(); ctx.arc(7, -2, 5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#d4a'; ctx.lineWidth = 1.5; ctx.stroke();
      }
    }
  }
  // 枪口火光
  if (u.muzzle > 0) {
    const ma = ctx.createRadialGradient(19, 0, 1, 19, 0, 7);
    ma.addColorStop(0, '#fff'); ma.addColorStop(0.3, '#ffe860'); ma.addColorStop(0.7, 'rgba(255,150,30,0.6)'); ma.addColorStop(1, 'rgba(255,80,10,0)');
    ctx.fillStyle = ma; ctx.beginPath(); ctx.arc(19, 0, 7, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

// 高清人形角色：逼真脸/发型/胡须/头盔 + 渐变躯干 + 徽记 + 名字
function drawHumanoid(ctx, sx, sy, u, time, playerTeam) {
  const r = u.radius;
  const p = u.profile;
  const primary = p ? p.primary : (u.team === 'china' ? COLORS.china : COLORS.usa);
  const secondary = p ? p.secondary : (u.team === 'china' ? '#1d7a40' : '#b83227');
  const accent = p ? (p.accent || '#e8c84a') : '#e8c84a';
  const skin = p ? p.skin : COLORS.skin;
  const skinDark = shade(skin, -0.2);
  const hair = p ? p.hair : null;
  const beard = p ? p.beard : false;
  const beardColor = p ? p.beardColor : null;
  const helmet = p ? p.helmet : 'basic';
  const emblem = p ? p.emblem : '';
  const cx = Math.round(sx);

  // 柔和椭圆阴影
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(cx, Math.round(sy + r + 2), r * 0.7, 3, 0, 0, Math.PI * 2); ctx.fill();

  const moving = u.noise > 0.2;
  const bob = moving ? Math.round(Math.sin(time * 12 + u.x * 0.05) * 1.5) : 0;
  const cy = sy + bob;
  const feetY = Math.round(cy + r);
  const legH = 6, torsoH = 12, headR = 6, torsoW = 13, shoulderY = feetY - legH - torsoH;
  const headY = shoulderY - headR * 2 - 1;
  const facingRight = Math.cos(u.facing) >= 0;

  // --- 腿（圆角）---
  const lg = ctx.createLinearGradient(0, feetY - legH, 0, feetY);
  lg.addColorStop(0, '#4a4f58'); lg.addColorStop(1, '#2a2e35');
  ctx.fillStyle = lg;
  roundRect(ctx, cx - 5, feetY - legH, 4, legH, 1.5);
  roundRect(ctx, cx + 1, feetY - legH, 4, legH, 1.5);
  ctx.fillStyle = '#1f2329';
  roundRect(ctx, cx - 5.5, feetY - 2, 5, 3, 1);
  roundRect(ctx, cx + 0.5, feetY - 2, 5, 3, 1);

  // --- 躯干（渐变盔甲 + 高光 + 腰带 + 徽记）---
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  roundRect(ctx, cx - torsoW / 2 - 1, shoulderY - 1, torsoW + 2, torsoH + 2, 3);
  const tg = ctx.createLinearGradient(0, shoulderY, 0, shoulderY + torsoH);
  tg.addColorStop(0, primary); tg.addColorStop(1, secondary);
  ctx.fillStyle = tg;
  roundRect(ctx, cx - torsoW / 2, shoulderY, torsoW, torsoH, 2.5);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  roundRect(ctx, cx - torsoW / 2, shoulderY, torsoW, torsoH * 0.4, 2.5);
  ctx.fillStyle = '#1f2329';
  roundRect(ctx, cx - torsoW / 2 - 1, shoulderY + torsoH - 3.5, torsoW + 2, 3.5, 1.5);
  if (emblem) {
    ctx.fillStyle = accent;
    Render.text(ctx, emblem, cx, shoulderY + torsoH * 0.55, accent, 9, 'center');
  }

  // --- 头（逼真脸 + 发型/胡须/头盔/眼睛）---
  drawHead(ctx, cx, headY, headR, { skin, skinDark, hair, beard, beardColor, helmet, accent, primary, facingRight });

  // --- 手臂 + 武器 ---
  drawPixelWeapon(ctx, cx, shoulderY + 6, u, primary);

  // --- 玩家白色光环 ---
  if (u.isPlayer) {
    ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(cx, (headY + feetY) / 2, r + 3, (feetY - headY) / 2 + 3, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // --- 血条（圆角）---
  const bw2 = r * 2;
  const barY = headY - 9;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  roundRect(ctx, cx - bw2 / 2 - 1, barY - 1, bw2 + 2, 5, 2);
  const hpRatio = Math.max(0, u.hp / u.maxHp);
  const hpCol = hpRatio > 0.5 ? '#5fd35f' : (hpRatio > 0.25 ? '#ffd24a' : '#ff5a4a');
  ctx.fillStyle = hpCol;
  roundRect(ctx, cx - bw2 / 2, barY, bw2 * hpRatio, 3, 1.5);

  // --- 名字标签 ---
  let label, labelCol;
  if (u.isPlayer) { label = '你'; labelCol = '#ffffff'; }
  else if (p) { label = p.name; labelCol = u.team === 'china' ? '#ffe08a' : '#ffd0c0'; }
  else { label = u.team === playerTeam ? '友' : '敌'; labelCol = primary; }
  Render.text(ctx, label, cx, headY - 14, labelCol, 10, 'center');
}

// 逼真头部：肤色渐变 + 发型 + 胡须 + 头盔 + 眼睛朝向
function drawHead(ctx, hx, hy, R, o) {
  const { skin, skinDark, hair, beard, beardColor, helmet, accent, primary, facingRight } = o;
  // 脸
  const hg = ctx.createRadialGradient(hx - 1, hy - 1, 1, hx, hy, R);
  hg.addColorStop(0, skin); hg.addColorStop(1, skinDark);
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.arc(hx, hy, R, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 0.8; ctx.stroke();

  // 头发（顶部 / 长发后披）；钢铁侠面甲覆盖则不画头发
  if (hair && helmet !== 'ironman' && helmet !== 'hulk') {
    ctx.fillStyle = hair;
    if (helmet === 'thor' || helmet === 'widow') {
      ctx.beginPath(); ctx.arc(hx, hy, R + 1.5, Math.PI * 0.8, Math.PI * 2.2); ctx.fill();
      ctx.fillRect(hx - R - 1, hy, 2.5, R); ctx.fillRect(hx + R - 1.5, hy, 2.5, R);
    } else {
      ctx.beginPath(); ctx.arc(hx, hy, R + 0.5, Math.PI, Math.PI * 2); ctx.fill();
    }
  }
  // 胡须
  if (beard && beardColor) {
    ctx.fillStyle = beardColor;
    ctx.beginPath();
    ctx.moveTo(hx - R * 0.7, hy + R * 0.2);
    ctx.quadraticCurveTo(hx, hy + R * 1.4, hx + R * 0.7, hy + R * 0.2);
    ctx.quadraticCurveTo(hx, hy + R * 0.5, hx - R * 0.7, hy + R * 0.2);
    ctx.closePath(); ctx.fill();
  }

  // 头盔 / 面部装饰
  drawHelmet(ctx, hx, hy, R, o);

  // 眼睛（面向侧）
  const ex = facingRight ? 1.5 : -1.5;
  if (helmet === 'ironman') {
    ctx.fillStyle = '#7fe9ff';
    ctx.beginPath(); ctx.ellipse(hx + ex - 0.5, hy - 1, 1.6, 1, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(hx + ex + 2.5, hy - 1, 1.6, 1, 0, 0, Math.PI * 2); ctx.fill();
  } else if (helmet === 'hulk') {
    ctx.fillStyle = '#16260f';
    ctx.beginPath(); ctx.arc(hx + ex - 0.5, hy - 0.5, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx + ex + 2, hy - 0.5, 1, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#16260f'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(hx + ex - 1.5, hy - 2); ctx.lineTo(hx + ex + 0.5, hy - 1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hx + ex + 1, hy - 1); ctx.lineTo(hx + ex + 3, hy - 2); ctx.stroke();
  } else {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(hx + ex - 0.5, hy - 1, 1.6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(hx + ex - 0.2, hy - 1, 0.9, 0, Math.PI * 2); ctx.fill();
  }
}

// 头盔 / 头部装饰（按风格）
function drawHelmet(ctx, hx, hy, R, o) {
  const { helmet, primary, accent } = o;
  if (helmet === 'ironman') {
    ctx.fillStyle = primary;
    roundRect(ctx, hx - R, hy - R, R * 2, R + 2, R * 0.6); // 面甲只盖上半脸，下巴留肤色
    ctx.strokeStyle = accent; ctx.lineWidth = 1; ctx.stroke();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(hx, hy - R); ctx.lineTo(hx, hy + R); ctx.stroke();
    return;
  }
  if (helmet === 'thor') {
    ctx.strokeStyle = accent; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(hx, hy - 1, R * 0.9, Math.PI * 1.05, Math.PI * 1.95); ctx.stroke();
    return;
  }
  if (helmet === 'widow') { ctx.fillStyle = accent; ctx.fillRect(hx - R, hy - 2, R * 2, 2); return; }
  if (helmet === 'hulk') return;
  // 其余：头顶盔/帽（上半弧）
  let col = primary;
  if (helmet === 'guan') col = '#1f7a40';
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(hx, hy, R + 1, Math.PI, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 0.8; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.arc(hx - 2, hy - R * 0.6, R * 0.4, Math.PI, Math.PI * 2); ctx.fill();
  if (helmet === 'guan') { ctx.fillStyle = '#e23b2e'; ctx.beginPath(); ctx.arc(hx, hy - R - 0.5, 2, 0, Math.PI * 2); ctx.fill(); }
  else if (helmet === 'ming' || helmet === 'ming2' || helmet === 'mulant') { ctx.fillStyle = '#e23b2e'; ctx.beginPath(); ctx.arc(hx, hy - R, 1.6, 0, Math.PI * 2); ctx.fill(); }
  if (helmet === 'mulant') {
    ctx.fillStyle = primary;
    ctx.beginPath(); ctx.arc(hx - R - 1, hy - R * 0.3, 2.4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx + R + 1, hy - R * 0.3, 2.4, 0, Math.PI * 2); ctx.fill();
  }
  if (helmet === 'cap') { ctx.fillStyle = '#fff'; drawStar(ctx, hx, hy - R * 0.3, 2.2, 5); }
  if (helmet === 'bai') { ctx.strokeStyle = accent; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(hx, hy, R + 1, Math.PI, Math.PI * 2); ctx.stroke(); }
}

// 圆角矩形辅助函数
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
  ctx.fill();
}

// 高清投射物：渐变拖尾 + 发光圆核 + 外辉光
function drawProjectile(ctx, cam, p) {
  const [sx, sy] = cam.toScreen(p.x, p.y);
  const isBullet = p.kind === 'bullet';
  const isGrenade = p.kind === 'grenade';
  // 拖尾（渐变透明度 + 宽度）
  for (let i = 1; i < p.trail.length; i++) {
    const a = i / p.trail.length;
    const [ax, ay] = cam.toScreen(p.trail[i - 1].x, p.trail[i - 1].y);
    const [bx, by] = cam.toScreen(p.trail[i].x, p.trail[i].y);
    const alpha = isBullet ? a * 0.85 : a * 0.55;
    const w = isBullet ? 3 + a * 2 : 2 + a * 1.5;
    ctx.strokeStyle = isBullet ? `rgba(255,240,160,${alpha})` : (isGrenade ? `rgba(255,140,80,${alpha})` : `rgba(180,200,220,${alpha})`);
    ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
  }
  // 外辉光
  const glowCol = isBullet ? 'rgba(255,245,180,0.4)' : (isGrenade ? 'rgba(255,150,70,0.35)' : 'rgba(200,220,240,0.3)');
  ctx.fillStyle = glowCol;
  ctx.beginPath(); ctx.arc(Math.round(sx), Math.round(sy), isBullet ? 8 : 8, 0, Math.PI * 2); ctx.fill();
  // 核心发光圆
  const coreG = ctx.createRadialGradient(sx, sy, 0, sx, sy, isBullet ? 4 : 5);
  const coreCol = isBullet ? '#fffde0' : (isGrenade ? '#ff9a3c' : '#f0f4f8');
  coreG.addColorStop(0, coreCol); coreG.addColorStop(0.6, isBullet ? '#ffe680' : (isGrenade ? '#e06020' : '#8899aa'));
  coreG.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = coreG;
  ctx.beginPath(); ctx.arc(Math.round(sx), Math.round(sy), isBullet ? 5.5 : 6, 0, Math.PI * 2); ctx.fill();
}

// ========== 地图渲染辅助函数 ==========

// 逼真松树：柔和阴影 + 纹理树干 + 三层锥形渐变树冠（带受光高光边）
function drawTree(ctx, sx, sy, tx, ty, snow) {
  const seed = (tx * 31 + ty * 17) & 0xfff;
  const cx = sx + 20 + ((seed % 9) - 4);
  const baseY = sy + 38;
  // 地面柔影
  ctx.fillStyle = 'rgba(20,40,15,0.28)';
  ctx.beginPath(); ctx.ellipse(cx, baseY + 1, 15, 5, 0, 0, Math.PI * 2); ctx.fill();
  // 树干（横向木纹渐变）
  const tg = ctx.createLinearGradient(cx - 4, 0, cx + 4, 0);
  tg.addColorStop(0, '#5a3a1c'); tg.addColorStop(0.5, '#8a5a2e'); tg.addColorStop(1, '#4e3017');
  ctx.fillStyle = tg;
  ctx.fillRect(cx - 3.5, baseY - 20, 7, 20);
  ctx.strokeStyle = 'rgba(50,30,12,0.35)'; ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) { const yy = baseY - 6 - i * 5; ctx.beginPath(); ctx.moveTo(cx - 3, yy); ctx.lineTo(cx + 3, yy); ctx.stroke(); }
  // 三层锥形树冠
  const layers = [
    { y: baseY - 18, w: 30, h: 22 },
    { y: baseY - 32, w: 24, h: 20 },
    { y: baseY - 45, w: 17, h: 18 },
  ];
  for (const L of layers) {
    const cg = ctx.createLinearGradient(cx, L.y, cx, L.y + L.h);
    if (snow) { cg.addColorStop(0, '#f2f7f4'); cg.addColorStop(1, '#c4d4cb'); }
    else { cg.addColorStop(0, '#3f9e57'); cg.addColorStop(1, '#1d6e34'); }
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.moveTo(cx, L.y);
    ctx.lineTo(cx - L.w / 2, L.y + L.h);
    ctx.lineTo(cx + L.w / 2, L.y + L.h);
    ctx.closePath();
    ctx.fill();
    // 受光高光边（左）
    ctx.strokeStyle = snow ? 'rgba(255,255,255,0.6)' : 'rgba(120,210,140,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx, L.y); ctx.lineTo(cx - L.w / 2, L.y + L.h); ctx.stroke();
  }
  if (snow) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.ellipse(cx - 2, baseY - 46, 8, 3, 0, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.fillStyle = 'rgba(140,220,150,0.7)';
    ctx.beginPath(); ctx.ellipse(cx - 2, baseY - 44, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
  }
}

// 逼真岩石：径向渐变（左上受光、右下暗）+ 裂纹 + 雪盖
function drawRock(ctx, sx, sy, snow) {
  const cx = sx + 20, cy = sy + 24;
  ctx.fillStyle = 'rgba(20,30,20,0.25)';
  ctx.beginPath(); ctx.ellipse(cx, cy + 8, 14, 5, 0, 0, Math.PI * 2); ctx.fill();
  const rg = ctx.createRadialGradient(cx - 6, cy - 6, 3, cx, cy, 18);
  if (snow) { rg.addColorStop(0, '#f4f7fa'); rg.addColorStop(1, '#9aa6b0'); }
  else { rg.addColorStop(0, COLORS.rockLight); rg.addColorStop(0.6, COLORS.rock); rg.addColorStop(1, COLORS.rockDark); }
  ctx.fillStyle = rg;
  ctx.beginPath();
  ctx.moveTo(cx - 13, cy + 6);
  ctx.lineTo(cx - 9, cy - 8);
  ctx.lineTo(cx + 2, cy - 11);
  ctx.lineTo(cx + 12, cy - 3);
  ctx.lineTo(cx + 13, cy + 7);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx + 2, cy - 11); ctx.lineTo(cx + 4, cy + 2); ctx.lineTo(cx - 3, cy + 6); ctx.stroke();
  if (snow) { ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.beginPath(); ctx.ellipse(cx - 5, cy - 7, 6, 2.5, 0, 0, Math.PI * 2); ctx.fill(); }
}

// 逼真水面：蓝绿竖向渐变 + 流动波纹 + 高光点
function drawLakeTile(ctx, sx, sy, tx, ty, time) {
  const g = ctx.createLinearGradient(sx, sy, sx, sy + TILE);
  g.addColorStop(0, '#3a92dd');
  g.addColorStop(1, '#1f6fb8');
  ctx.fillStyle = g;
  ctx.fillRect(sx, sy, TILE, TILE);
  const t = time || 0;
  ctx.strokeStyle = 'rgba(185,228,255,0.5)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    const yy = sy + 8 + i * 11 + Math.sin(t * 1.5 + tx + i) * 1.5;
    ctx.beginPath();
    ctx.moveTo(sx + 4, yy);
    ctx.quadraticCurveTo(sx + TILE / 2, yy - 3, sx + TILE - 4, yy);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  for (let i = 0; i < 2; i++) { ctx.beginPath(); ctx.arc(sx + 10 + i * 18 + Math.sin(t + i) * 2, sy + 14 + i * 12, 2, 0, Math.PI * 2); ctx.fill(); }
}

// 国籍主题石板广场（逐格铺地）
function drawBaseFloor(ctx, sx, sy, tx, ty, team) {
  const isChina = team === 'china';
  const base = isChina ? '#caa05a' : '#9aa6c8';   // 石板暖/冷色
  const dark = isChina ? '#9c7838' : '#6f7c9e';
  const bg = ctx.createLinearGradient(sx, sy, sx, sy + TILE);
  bg.addColorStop(0, base); bg.addColorStop(1, dark);
  ctx.fillStyle = bg; ctx.fillRect(sx, sy, TILE, TILE);
  // 石板格缝
  ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1;
  ctx.strokeRect(sx + 0.5, sy + 0.5, TILE - 1, TILE - 1);
  // 国籍色边角点缀
  if ((tx + ty) % 2 === 0) {
    ctx.fillStyle = isChina ? 'rgba(200,30,40,0.25)' : 'rgba(40,70,150,0.25)';
    ctx.fillRect(sx + 4, sy + 4, TILE - 8, TILE - 8);
  }
}

// 基地上方国籍主题装饰（旗帜 / 徽记 / 门楼 / 灯笼或栅栏）
function drawBaseDecor(ctx, b, team, cam) {
  const cx = (b.tx + b.tw / 2) * TILE - cam.x;
  const cy = (b.ty + b.th / 2) * TILE - cam.y;
  const isChina = team === 'china';
  const pr = isChina ? '#c4282e' : '#2a4d8f';
  const sc = isChina ? '#e8c84a' : '#eef2f8';
  // 地面大徽记
  ctx.save();
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = isChina ? 'rgba(200,30,40,0.18)' : 'rgba(40,70,150,0.18)';
  ctx.beginPath(); ctx.arc(cx, cy, 34, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = isChina ? 'rgba(200,30,40,0.5)' : 'rgba(40,70,150,0.5)';
  ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, 34, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = isChina ? '#c4282e' : '#2a4d8f';
  if (isChina) Render.text(ctx, '中', cx, cy + 10, '#c4282e', 30, 'center');
  else { ctx.fillStyle = '#2a4d8f'; drawStar(ctx, cx, cy, 13, 5); }
  ctx.restore();

  // 旗杆 + 国旗（基地顶边中央）
  const fx = cx, fy = cy - b.th * TILE / 2 - 6;
  ctx.strokeStyle = '#6b4a2a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy - 40); ctx.stroke();
  // 旗面
  ctx.fillStyle = pr; ctx.fillRect(fx, fy - 40, 34, 22);
  if (isChina) {
    // 五星红旗：大星 + 小星
    ctx.fillStyle = '#e8c84a'; drawStar(ctx, fx + 7, fy - 33, 4, 5);
    ctx.fillStyle = '#e8c84a';
    for (const d of [[16, -36], [20, -32], [20, -28], [16, -24]]) drawStar(ctx, fx + d[0], fy + d[1], 1.6, 5);
  } else {
    // 星条旗：条纹 + 蓝角星
    for (let i = 0; i < 4; i++) { ctx.fillStyle = i % 2 ? '#eef2f8' : '#c4282e'; ctx.fillRect(fx, fy - 40 + i * 5.5, 34, 2.8); }
    ctx.fillStyle = '#2a4d8f'; ctx.fillRect(fx, fy - 40, 14, 11);
    ctx.fillStyle = '#eef2f8'; drawStar(ctx, fx + 4, fy - 36, 1.6, 5); drawStar(ctx, fx + 9, fy - 36, 1.6, 5);
  }
  // 顶饰
  ctx.fillStyle = sc; ctx.beginPath(); ctx.arc(fx, fy - 40, 2, 0, Math.PI * 2); ctx.fill();

  // 风格化门楼 / 栅栏
  const w = b.tw * TILE, left = cx - w / 2, top = cy - b.th * TILE / 2;
  if (isChina) {
    // 飞檐门楼（红柱 + 金色翘檐）
    ctx.fillStyle = '#8a1f17'; ctx.fillRect(left, top - 4, 6, 10); ctx.fillRect(left + w - 6, top - 4, 6, 10);
    const rg = ctx.createLinearGradient(0, top - 16, 0, top - 2);
    rg.addColorStop(0, '#c4282e'); rg.addColorStop(1, '#8a1f17');
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.moveTo(left - 6, top - 2); ctx.quadraticCurveTo(left + w / 2, top - 20, left + w + 6, top - 2);
    ctx.lineTo(left + w - 4, top - 2); ctx.quadraticCurveTo(left + w / 2, top - 12, left + 4, top - 2);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#e8c84a'; ctx.fillRect(left - 6, top - 4, w + 12, 3);
    // 红灯笼
    for (const lx of [left + 10, left + w - 10]) {
      ctx.fillStyle = '#e23b2e'; ctx.beginPath(); ctx.ellipse(lx, top + 6, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#e8c84a'; ctx.fillRect(lx - 1, top + 1, 2, 1.5); ctx.fillRect(lx - 1, top + 11, 2, 1.5);
    }
  } else {
    // 白栅栏
    ctx.fillStyle = '#eef2f8';
    for (let i = 0; i <= w; i += 12) ctx.fillRect(left + i, top - 2, 3, 10);
    ctx.fillRect(left, top + 2, w, 3);
    // 鹰徽（简笔）
    ctx.fillStyle = '#cfd6e2';
    ctx.beginPath(); ctx.moveTo(cx, top + 14); ctx.lineTo(cx - 8, top + 9); ctx.lineTo(cx - 3, top + 12);
    ctx.lineTo(cx, top + 10); ctx.lineTo(cx + 3, top + 12); ctx.lineTo(cx + 8, top + 9); ctx.closePath(); ctx.fill();
  }
}

// 启动
const canvas = document.getElementById('game');
const __game = new Game(canvas);
if (typeof window !== 'undefined') window.__game = __game;
